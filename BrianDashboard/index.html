<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--bg-card:#161b22;--bg-hover:#1c2128;--border:#21262d;--text:#c9d1d9;--text-h:#e6edf3;--text-m:#8b949e;--text-d:#484f58}
html,body{height:100%;background:var(--bg);font-family:system-ui,-apple-system,sans-serif;color:var(--text);overflow:hidden}
body{display:flex;flex-direction:column;height:100vh}
html.light{--bg:#ffffff;--bg-card:#ffffff;--bg-hover:#f0f2f5;--border:#d0d7de;--text:#1f2328;--text-h:#1f2328;--text-m:#656d76;--text-d:#8b949e}

/* HEADER */
#header{background:var(--bg-card);border-bottom:1px solid var(--border);padding:10px 20px;flex-shrink:0;display:flex;align-items:center;gap:0}
#header-title{width:160px;flex-shrink:0;padding-right:12px}
#header h1{font-size:17px;font-weight:700;color:var(--text-h);letter-spacing:.02em;white-space:nowrap}
.header-sub{font-size:11px;color:var(--text-m);background:var(--bg);padding:2px 8px;border-radius:10px;font-weight:600}

/* METRICS BAR */
#metrics-bar{flex:1;display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:center}
.hmetric{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:7px 14px;display:flex;flex-direction:column;min-width:90px}
.hmetric-label{font-size:10px;color:#8b949e;letter-spacing:.05em;text-transform:uppercase;margin-bottom:2px}
.hmetric-value{font-size:18px;font-weight:800;color:var(--text-h);line-height:1}
.hmetric-sub{font-size:10px;color:#8b949e;margin-top:2px}
.hmetric.teal .hmetric-value{color:#7ecfe0}
.hmetric.green .hmetric-value{color:#3fb950}
.hmetric.purple .hmetric-value{color:#d2a8ff}
.hmetric.orange .hmetric-value{color:#f0a500}
.hmetric.lift .hmetric-value{color:#3fb950;font-size:22px}

/* VERSION */
#version-badge{position:fixed;bottom:10px;right:14px;font-size:14px;font-weight:700;color:#7ecfe0;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:4px 12px;z-index:100;pointer-events:none}

/* LAYOUT */
#main{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
#sidebar{width:200px;flex-shrink:0;background:var(--bg-card);border-right:1px solid var(--border);overflow-y:auto;padding:6px 0}
.div-item{padding:8px 14px 8px 10px;cursor:pointer;border-left:3px solid transparent;transition:all .12s;font-size:12px;color:#8b949e;line-height:1.3}
.div-item:hover{background:var(--bg-hover);color:var(--text)}
.div-item.active{background:var(--bg-hover);border-left-color:#7ecfe0;color:var(--text-h);font-weight:600}
.div-item.cancelled{opacity:.5}
.div-date{font-size:10px;color:#484f58;margin-top:2px}
.div-itm-pill{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;margin-top:3px}
.pill-up{background:#0d2b0d;color:#3fb950;border:1px solid #1a4d1a}
.pill-flat{background:#21262d;color:#8b949e;border:1px solid #30363d}
.pill-none{background:#21262d;color:#484f58;border:1px solid #21262d}
.sidebar-section{padding:6px 14px 3px;font-size:10px;color:#484f58;letter-spacing:.06em;text-transform:uppercase;margin-top:4px}

/* CONTENT */
#content{flex:1;overflow-y:auto;padding:20px;background:var(--bg)}

/* OVERVIEW */
.overview-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.chart-card{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:16px}
.chart-card h3{font-size:13px;font-weight:700;color:#e6edf3;margin-bottom:12px;letter-spacing:.02em}
.chart-wrap{position:relative;height:260px}
.full-chart-card{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px}
.full-chart-wrap{position:relative;height:300px}

/* DIVISION DETAIL */
.d-header{margin-bottom:16px}
.d-name{font-size:22px;font-weight:700;color:#e6edf3}
.d-meta{font-size:13px;color:#8b949e;margin-top:3px}
.d-badges{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.badge{padding:3px 10px;border-radius:12px;font-size:10px;font-weight:700;letter-spacing:.05em;white-space:nowrap}
.badge-completed{background:#0d2b0d;color:#3fb950;border:1px solid #1a4d1a}
.badge-cancelled{background:#2d0d0d;color:#f85149;border:1px solid #4d1a1a}
.badge-pdp{background:#0d2137;color:#79c0ff;border:1px solid #1a3a6d}
.badge-virtual{background:#21262d;color:#8b949e;border:1px solid #30363d}

.d-metrics{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.d-metric{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:11px 14px;min-width:90px;flex:1;text-align:center}
.d-metric-val{font-size:22px;font-weight:800;color:#e6edf3;line-height:1}
.d-metric-label{font-size:10px;color:#8b949e;margin-top:4px;letter-spacing:.04em;text-transform:uppercase}
.d-metric.teal .d-metric-val{color:#7ecfe0}
.d-metric.green .d-metric-val{color:#3fb950}
.d-metric.purple .d-metric-val{color:#d2a8ff}

/* ITM BEFORE/AFTER CARD */
.itm-card{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;gap:24px;flex-wrap:wrap}
.itm-block{text-align:center}
.itm-num{font-size:32px;font-weight:900;line-height:1}
.itm-num.before{color:#8b949e}
.itm-num.after{color:#3fb950}
.itm-label{font-size:10px;color:#8b949e;text-transform:uppercase;letter-spacing:.06em;margin-top:4px}
.itm-arrow{font-size:28px;color:#484f58}
.itm-lift{text-align:center}
.itm-lift-val{font-size:28px;font-weight:900;color:#3fb950;line-height:1}
.itm-lift-label{font-size:10px;color:#8b949e;text-transform:uppercase;letter-spacing:.06em;margin-top:4px}

/* CARDS */
.info-section{margin-bottom:14px}
.info-section h4{font-size:11px;font-weight:700;color:#8b949e;letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px}
.info-card{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:13px 15px;font-size:13px;line-height:1.6;color:var(--text)}
.info-card.yellow{border-left:3px solid #e3b341}
.info-card.red{border-left:3px solid #f85149}
.info-card.teal{border-left:3px solid #7ecfe0}
.info-card.purple{border-left:3px solid #d2a8ff}
.info-card.green{border-left:3px solid #3fb950}

/* AMBASSADOR TABLE */
.amb-table{width:100%;border-collapse:collapse;font-size:12px}
.amb-table th{text-align:left;color:#8b949e;font-weight:600;padding:5px 8px;border-bottom:1px solid #21262d;font-size:10px;letter-spacing:.05em;text-transform:uppercase}
.amb-table td{padding:6px 8px;border-bottom:1px solid #0d1117;color:#c9d1d9}
.amb-table tr:last-child td{border-bottom:none}
.amb-table tr:hover td{background:#1c2128}

/* SUMMARY TABLE */
.summary-table{width:100%;border-collapse:collapse;font-size:12px}
.summary-table th{text-align:left;color:var(--text-m);font-weight:600;padding:6px 10px;border-bottom:1px solid var(--border);font-size:10px;letter-spacing:.05em;text-transform:uppercase;background:var(--bg-card)}
.summary-table td{padding:6px 10px;border-bottom:1px solid var(--border);color:var(--text)}
.summary-table tr:hover td{background:var(--bg-hover);cursor:pointer}
.summary-table tr.cancelled-row td{opacity:.5}
.td-lift{font-weight:700;color:#3fb950}
.td-flat{color:#8b949e}
.td-cancelled{color:#f85149}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}

/* LIGHT THEME */
html.light,html.light body,body.light{background:#f5f6f8 !important;color:#1f2328 !important}
body.light #content{background:#f5f6f8 !important}
body.light #header{background:#fff !important;border-bottom-color:#d0d7de !important}
body.light #header h1{color:#1f2328 !important}
body.light .header-sub{background:#eaeef2 !important;color:#656d76 !important}
body.light #sidebar{background:#fff !important;border-right-color:#d0d7de !important}
body.light .div-item{color:#656d76 !important}
body.light .div-item:hover{background:#f0f2f5 !important;color:#1f2328 !important}
body.light .div-item.active{background:#f0f2f5 !important;color:#1f2328 !important}
body.light .sidebar-section{color:#656d76 !important}
body.light .hmetric{background:#fff !important;border-color:#d0d7de !important}
body.light .hmetric-label{color:#656d76 !important}
body.light .hmetric-value{color:#1f2328 !important}
body.light .hmetric-sub{color:#656d76 !important}
body.light .full-chart-card,body.light .chart-card,body.light .info-card,body.light .itm-card,body.light .dd-assess,body.light .dd-metric,body.light .rm-stat,body.light .stat-card,body.light .metric-card{background:#fff !important;border-color:#d0d7de !important}
body.light .full-chart-card h3,body.light .chart-card h3{color:#1f2328 !important}
body.light .summary-table th{background:#f5f6f8 !important;color:#656d76 !important;border-color:#d0d7de !important}
body.light .summary-table td{border-color:#eaeef2 !important;color:#1f2328 !important}
body.light .summary-table tr:hover td{background:#f0f2f5 !important}
body.light .rm-table th{background:#f5f6f8 !important;color:#656d76 !important;border-color:#d0d7de !important}
body.light .rm-table td{border-color:#eaeef2 !important;color:#1f2328 !important}
body.light .rm-table tr:hover td{background:#f0f2f5 !important}
body.light .amb-table th{color:#656d76 !important;border-color:#d0d7de !important}
body.light .amb-table td{color:#1f2328 !important;border-color:#eaeef2 !important}
body.light .d-name{color:#1f2328 !important}
body.light .d-meta{color:#656d76 !important}
body.light .d-metric-val{color:#1f2328 !important}
body.light .d-metric-label{color:#656d76 !important}
body.light .dd-metric-val{color:#1f2328 !important}
body.light .dd-metric-label{color:#656d76 !important}
body.light .dd-assess p{color:#1f2328 !important}
body.light .metric-label,body.light .rm-stat-label{color:#656d76 !important}
body.light .period-btn{background:#eaeef2 !important;border-color:#d0d7de !important;color:#656d76 !important}
body.light .period-tab{background:#eaeef2 !important;border-color:#d0d7de !important;color:#656d76 !important}
body.light .rm-bar-wrap{background:#d0d7de !important}
body.light #version-badge{background:#fff !important;border-color:#d0d7de !important;color:#1f6feb !important}
body.light #themeToggle{background:#eaeef2 !important;border-color:#d0d7de !important;color:#1f2328 !important}
body.light ::-webkit-scrollbar-track{background:#f5f6f8 !important}
body.light ::-webkit-scrollbar-thumb{background:#d0d7de !important}

/* ACTIVE FILTER GLOW */
.filter-active{box-shadow:0 0 8px 2px rgba(126,207,224,0.6);font-weight:700 !important;color:#fff !important;background:#1f6feb !important;border-color:#1f6feb !important}
.period-btn{border-radius:6px;padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid #30363d;background:#21262d;color:#8b949e;transition:box-shadow .2s}
.period-btn.active{box-shadow:0 0 10px 3px rgba(126,207,224,0.5);background:#1f6feb !important;color:#fff !important;border-color:#7ecfe0 !important;font-weight:700}
.period-tab{border-radius:6px;padding:4px 10px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid #30363d;background:#21262d;color:#8b949e;transition:box-shadow .2s}
.period-tab.active{box-shadow:0 0 8px 2px rgba(126,207,224,0.5);background:#1f6feb !important;color:#fff !important;border-color:#7ecfe0 !important;font-weight:700}

/* DIVISION DETAIL V2 */
.dd-rank-badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;letter-spacing:.03em}
.dd-rank-badge.top{background:#0d2b0d;color:#3fb950;border:1px solid #1a4d1a}
.dd-rank-badge.mid{background:#2d1f00;color:#f0a500;border:1px solid #4a3200}
.dd-rank-badge.low{background:#2d0d0d;color:#f85149;border:1px solid #4d1a1a}
.dd-rank-badge.na{background:#21262d;color:#8b949e;border:1px solid #30363d}
.dd-metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:16px}
.dd-metric{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:10px 12px;text-align:center}
.dd-metric-val{font-size:20px;font-weight:800;line-height:1}
.dd-metric-label{font-size:9px;color:#8b949e;text-transform:uppercase;letter-spacing:.05em;margin-top:4px}
.dd-metric-rank{font-size:9px;font-weight:700;margin-top:3px}
.dd-assess{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:16px 18px;margin-bottom:14px}
.dd-assess h4{font-size:12px;font-weight:700;margin-bottom:8px;letter-spacing:.03em}
.dd-assess p{font-size:12px;line-height:1.6;color:#c9d1d9;margin-bottom:6px}
.dd-assess .flag{font-weight:700}
.dd-assess .flag.red{color:#f85149}
.dd-assess .flag.green{color:#3fb950}
.dd-assess .flag.amber{color:#f0a500}
.dd-assess .flag.muted{color:#8b949e}

/* RAINMAKERS */
.rm-controls{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.rm-controls input{background:#161b22;border:1px solid #30363d;border-radius:6px;padding:6px 12px;color:#c9d1d9;font-size:13px;width:200px;outline:none}
.rm-controls input:focus{border-color:#7ecfe0}
.rm-controls select{background:#161b22;border:1px solid #30363d;border-radius:6px;padding:6px 10px;color:#c9d1d9;font-size:13px;outline:none;cursor:pointer}
.rm-stats{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.rm-stat{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:9px 16px;text-align:center}
.rm-stat-val{font-size:20px;font-weight:800;color:var(--text-h)}
.rm-stat-val.teal{color:#7ecfe0}
.rm-stat-val.orange{color:#f0a500}
.rm-stat-label{font-size:10px;color:#8b949e;text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
.rm-table{width:100%;border-collapse:collapse;font-size:12px}
.rm-table th{text-align:left;color:var(--text-m);font-weight:600;padding:7px 10px;border-bottom:1px solid var(--border);font-size:10px;letter-spacing:.05em;text-transform:uppercase;background:var(--bg-card);position:sticky;top:0}
.rm-table td{padding:6px 10px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
.rm-table tr:hover td{background:var(--bg-hover)}
.rm-rank{color:#484f58;font-weight:700;font-size:11px;width:30px}
.rm-rank.top3{color:#f0a500;font-size:13px}
.rm-bar-wrap{width:80px;background:#21262d;border-radius:3px;height:6px;display:inline-block;vertical-align:middle;margin-left:6px}
.rm-bar-fill{height:6px;border-radius:3px;background:linear-gradient(90deg,#1f6feb,#7ecfe0)}
.rm-pack-badge{display:inline-block;font-size:10px;font-weight:700;padding:1px 5px;border-radius:4px;margin-right:3px}
.rm-p25{background:#0d2b0d;color:#3fb950;border:1px solid #1a4d1a}
.rm-p10{background:#0d2137;color:#79c0ff;border:1px solid #1a3a6d}
.rm-p8{background:#2d1f00;color:#f0a500;border:1px solid #4a3200}
.contact-wrap{position:relative;display:inline-block;cursor:default}
.contact-wrap .contact-tip{display:none;position:absolute;right:0;top:120%;z-index:999;background:#1c2128;border:1px solid #30363d;border-radius:8px;padding:10px 14px;min-width:200px;box-shadow:0 4px 16px rgba(0,0,0,.5);white-space:nowrap}
.contact-wrap:hover .contact-tip{display:block}
.contact-tip-row{font-size:12px;color:#c9d1d9;margin-bottom:5px;display:flex;align-items:center;gap:8px}
.contact-tip-row:last-child{margin-bottom:0}
.contact-tip-row a{color:#7ecfe0;text-decoration:none}
.contact-tip-row a:hover{text-decoration:underline}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:#0d1117}
::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#484f58}
</style>
</head>

<script>
// Theme toggle — isolated so nothing can break it
const _batHtml = '<svg width="28" height="36" viewBox="0 0 100 130" style="pointer-events:none"><path d="M50 0C45 0 42 8 38 15C34 22 28 30 22 35C16 40 8 38 2 42C0 44 0 46 2 48C8 52 16 55 22 60C28 65 32 72 36 82C40 92 44 105 46 115C48 122 49 128 50 130C51 128 52 122 54 115C56 105 60 92 64 82C68 72 72 65 78 60C84 55 92 52 98 48C100 46 100 44 98 42C92 38 84 40 78 35C72 30 66 22 62 15C58 8 55 0 50 0Z" fill="#8b949e"/><path d="M35 75C38 72 42 68 45 65C47 63 48 61 50 60C52 61 53 63 55 65C58 68 62 72 65 75C63 73 58 70 55 68C53 67 51 66 50 66C49 66 47 67 45 68C42 70 37 73 35 75Z" fill="#21262d"/><path d="M30 85C33 80 38 76 42 73L50 68L58 73C62 76 67 80 70 85C67 82 62 78 58 76L50 72L42 76C38 78 33 82 30 85Z" fill="#21262d"/></svg>';
const _boltHtml = '<svg width="22" height="28" viewBox="0 0 16 20" style="pointer-events:none"><path d="M9.5 0L0 11.5h6L5 20l11-12.5H9.5z" fill="#f0a500"/></svg>';
function toggleTheme(){
  var el = document.documentElement;
  el.classList.toggle('light');
  var isLight = el.classList.contains('light');
  var btn = document.getElementById('themeToggle');
  if(btn){
    btn.innerHTML = isLight ? _boltHtml : _batHtml;
    btn.style.background = isLight ? '#eaeef2' : 'transparent';
    btn.style.border = isLight ? '1px solid #d0d7de' : 'none';
  }
}
</script>

/* ── COMPUTED TOTALS ── */
function getTotals(){
  const active = VISITS.filter(v=>v.status!=='cancelled' && v.status!=='scheduled');
  const withITM = active.filter(v=>v.preITM!==null && v.postITM!==null);
  const totalReps = active.reduce((s,v)=>s+(v.reps||0),0);
  const totalCert = active.reduce((s,v)=>s+(v.certified||0),0);
  const totalAmb = active.reduce((s,v)=>s+v.ambassadors.filter(a=>a.name&&!a.name.startsWith('(')).length,0);
  const totalPreITM = withITM.reduce((s,v)=>s+v.preITM,0);
  const totalPostITM = withITM.reduce((s,v)=>s+v.postITM,0);
  const itmLift = totalPreITM>0 ? Math.round((totalPostITM-totalPreITM)/totalPreITM*100) : null;
  const excluded = ['n/a','virtual / n/a','virtual','(departed early — 3hr drive to baltimore)','(all models closed — team went to top golf)','(models closed — weather)'];
  const totalModelHomes = active.reduce((s,v)=>s+v.modelHomes.filter(m=>m&&!excluded.includes(m.toLowerCase())).length,0);
  return {divisions:active.length, reps:totalReps, certified:totalCert, ambassadors:totalAmb, preITM:totalPreITM, postITM:totalPostITM, itmLift, modelHomes:totalModelHomes};
}

function findDivKey(name){
  if(DIV_KEY_MAP[name]!==undefined) return DIV_KEY_MAP[name]||null;
  const n=name.toLowerCase().replace(/[^a-z0-9]/g,'_').replace(/_+/g,'_').replace(/^_|_$/g,'');
  const allDivs=[...new Set((CONV_DATA?.monthly||[]).map(d=>d.div))];
  return allDivs.find(d=>d===n)||allDivs.find(d=>d.includes(n)||n.includes(d))||null;
}
function rankAmong(arr,val,desc=true){
  const sorted=[...arr].sort((a,b)=>desc?b-a:a-b);
  const idx=sorted.indexOf(val);
  return idx>=0?idx+1:arr.length;
}
function rankClass(rank,total){
  const pct=rank/total;
  return pct<=0.25?'top':pct<=0.6?'mid':'low';
}
function trendDir(arr){
  if(arr.length<3) return 'insufficient';
  const half=Math.floor(arr.length/2);
  const first=arr.slice(0,half).reduce((a,b)=>a+b,0)/half;
  const second=arr.slice(half).reduce((a,b)=>a+b,0)/(arr.length-half);
  const pctChange=first>0?((second-first)/first*100):0;
  if(pctChange>10) return 'improving';
  if(pctChange<-10) return 'declining';
  return 'flat';
}

  const rankConv = myYearly ? allConv.indexOf(myYearly.r)+1 : nDivs;
  const rankE = myYearly ? allE.indexOf(myYearly.e)+1 : nDivs;
  const overallRank = Math.round((rankPk+rankConv)/2);

  // ── Before/After training analysis ──
  const trainDate = v.date ? new Date(v.date) : null;
  const trainP = trainDate ? trainDate.getFullYear()+'-'+String(trainDate.getMonth()+1).padStart(2,'0') : null;
  const before = trainP ? convAll.filter(d=>d.p<trainP) : [];
  const after = trainP ? convAll.filter(d=>d.p>=trainP) : [];
  const avgConvBefore = before.length>0 ? (before.reduce((s,d)=>s+d.r,0)/before.length) : null;
  const avgConvAfter = after.length>0 ? (after.reduce((s,d)=>s+d.r,0)/after.length) : null;
  const avgPkBefore = before.length>0 ? (before.reduce((s,d)=>s+d.pk,0)/before.length) : null;
  const avgPkAfter = after.length>0 ? (after.reduce((s,d)=>s+d.pk,0)/after.length) : null;
  const convChange = avgConvBefore!==null&&avgConvAfter!==null ? avgConvAfter-avgConvBefore : null;
  const pkChange = avgPkBefore!==null&&avgPkAfter!==null ? ((avgPkAfter-avgPkBefore)/Math.max(avgPkBefore,0.01)*100) : null;

  // Recent trend (last 6 months)
  const recent6 = convAll.slice(-6);
  const trend = trendDir(recent6.map(d=>d.pk));
  const trendConv = trendDir(recent6.map(d=>d.r));

  // Rainmakers in this division
  const divRainmakers = (typeof RAINMAKERS!=='undefined'?RAINMAKERS:[]).filter(r=>{
    const rn=normDiv(r.d), vn=normDiv(v.division);
    return rn===vn||rn.includes(vn.substring(0,5))||vn.includes(rn.substring(0,5));
  }).sort((a,b)=>b.t-a.t).slice(0,8);

  // ── Honest assessment ──
  const issues = [];
  const strengths = [];
  const actions = [];

  if(!dk || convAll.length===0){
    issues.push('No conversion data found for this division — either not tracked or no eligible homes.');
  } else {
    // Conv rate assessment
    if(avgConv>=3) strengths.push(`Strong overall conversion rate of ${avgConv.toFixed(2)}%.`);
    else if(avgConv>=1.5) issues.push(`Conversion rate of ${avgConv.toFixed(2)}% is middling — room for improvement.`);
    else issues.push(`Conversion rate of ${avgConv.toFixed(2)}% is critically low. Needs immediate attention.`);

    // Training impact
    if(convChange!==null){
      if(convChange>0.5) strengths.push(`Training produced a measurable lift: conv rate went from ${avgConvBefore.toFixed(1)}% to ${avgConvAfter.toFixed(1)}% (+${convChange.toFixed(1)}pp).`);
      else if(convChange>-0.3) issues.push(`Training impact is negligible: conv rate was ${avgConvBefore!==null?avgConvBefore.toFixed(1):'?'}% before, ${avgConvAfter!==null?avgConvAfter.toFixed(1):'?'}% after. No meaningful lift.`);
      else issues.push(`Conversion rate DECLINED after training: ${avgConvBefore!==null?avgConvBefore.toFixed(1):'?'}% → ${avgConvAfter!==null?avgConvAfter.toFixed(1):'?'}%. Training did not stick — needs follow-up or retraining.`);
    }
    if(pkChange!==null){
      if(pkChange>15) strengths.push(`Packs/month improved ${pkChange.toFixed(0)}% after training (${avgPkBefore.toFixed(1)} → ${avgPkAfter.toFixed(1)} avg/mo).`);
      else if(pkChange<-15) issues.push(`Packs/month dropped ${Math.abs(pkChange).toFixed(0)}% after training (${avgPkBefore.toFixed(1)} → ${avgPkAfter.toFixed(1)} avg/mo). Volume is declining.`);
    }

    // Trend
    if(trend==='declining') issues.push('Recent 6-month pack trend is declining.');
    else if(trend==='improving') strengths.push('Recent 6-month pack trend is improving.');
    if(trendConv==='declining') issues.push('Conversion rate is trending downward over the last 6 months.');

    // Ranking
    if(overallRank<=3) strengths.push(`Ranked #${overallRank} of ${nDivs} divisions overall — top performer.`);
    else if(overallRank>nDivs*0.7) issues.push(`Ranked #${overallRank} of ${nDivs} — bottom third of all divisions.`);

    // Eligible homes
    if(myYearly && myYearly.e < 50) issues.push(`Very low eligible home count (${myYearly.e}) — limited opportunity in this market.`);

    // HST
    if(totalHst>totalPk*0.5 && totalHst>20) strengths.push(`Strong HST Direct adoption: ${totalHst} packs — supplementing traditional ITM.`);
    else if(totalHst===0 && hstAll.length===0) actions.push('No HST Direct activity detected. Evaluate if HST program is applicable here.');
  }

  // Actions
  if(v.certified===0 && v.reps>0) actions.push('Zero certifications from training — follow up on certification completion.');
  if(namedAmb.length===0) actions.push('No ambassadors identified — assign local champions to sustain momentum.');
  if(issues.length>strengths.length && trainP) actions.push('Consider scheduling a retraining visit — current metrics suggest the initial training has not held.');
  if(mhList.length===0) actions.push('No model home experiences set up — this is a missed opportunity for passive selling.');

  // ── Metric card helper ──
  function mCard(label,val,color,rankNum,rankTotal){
    const rc = rankNum&&rankTotal ? rankClass(rankNum,rankTotal) : 'na';
    const rankHtml = rankNum&&rankTotal ? `<div class="dd-metric-rank ${rc}">#${rankNum} of ${rankTotal}</div>` : '';
    return `<div class="dd-metric"><div class="dd-metric-val" style="color:${color}">${val}</div><div class="dd-metric-label">${label}</div>${rankHtml}</div>`;
  }

  const chartLabels = convAll.map(d=>d.p.substring(2)); // 23-06 format
  const chartConv = convAll.map(d=>d.r);
  const chartPk = convAll.map(d=>d.pk);
  const chartClMap = {}; closesAll.forEach(d=>{chartClMap[d.p]=d.n;});
  const chartCl = convAll.map(d=>chartClMap[d.p]||0);
  const chartHstMap = {}; hstAll.forEach(d=>{chartHstMap[d.p]=d.n;});
  const chartHst = convAll.map(d=>chartHstMap[d.p]||0);
  const trainIdx = trainP ? convAll.findIndex(d=>d.p>=trainP) : -1;

  _ce.innerHTML = `
    <div class="d-header" style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap">

        <div class="d-meta">${v.date||'Date TBD'} · ${v.type} · ${v.reps||0} reps trained · ${v.certified||0} certified · ${namedAmb.length} ambassadors</div>
        <div class="d-badges" style="margin-top:6px">${statusBadge}${typeBadge}</div>
      </div>

    ${(v.followUp||v.followUpNotes)?`<div class="info-section"><h4>Follow-Up</h4><div class="info-card" style="border-left:3px solid #79c0ff">${v.followUp?`<div><strong>${v.followUp}</strong></div>`:''}${v.followUpNotes?`<div style="color:#8b949e;margin-top:4px;font-size:12px">${v.followUpNotes}</div>`:''}</div></div>`:''}
    ${v.issues?`<div class="info-section"><h4>Issues</h4><div class="info-card red">${v.issues}</div></div>`:''}
  `;

  // ── Charts ──
  if(convAll.length>0){
    const ttBase={backgroundColor:'rgba(28,33,40,1)',borderColor:'#30363d',borderWidth:1,titleColor:'#e6edf3',bodyColor:'#c9d1d9',padding:10};

      ]},

        scales:{x:{ticks:{color:'#8b949e',font:{size:9},maxTicksLimit:15},grid:{color:'#21262d'}},y:{ticks:{color:'#8b949e',callback:v=>v+'%'},grid:{color:'#21262d'},beginAtZero:true}}
      },
      plugins:[{id:'trainLine',afterDraw(chart){
        if(trainIdx<0) return;
        const x=chart.scales.x.getPixelForTick(trainIdx);
        const{top,bottom}=chart.chartArea;
        const c=chart.ctx;
        c.save(); c.strokeStyle='#f0a500'; c.lineWidth=2; c.setLineDash([6,4]);
        c.beginPath(); c.moveTo(x,top); c.lineTo(x,bottom); c.stroke();
        c.fillStyle='#f0a500'; c.font='bold 9px system-ui'; c.textAlign='center';
        c.fillText('TRAINED',x,top-4); c.restore();
      }}]
    });
    // Packs + closes + HST chart
    new Chart(document.getElementById('ddPacksChart'),{
      type:'bar',
      data:{labels:chartLabels,datasets:[
        {label:'Packs Sold',data:chartPk,backgroundColor:'rgba(31,111,235,0.75)',borderRadius:3},

        plugins:{legend:{labels:{color:'#8b949e'}},tooltip:{...ttBase,mode:'index',intersect:false},datalabels:{display:false}},
        scales:{x:{ticks:{color:'#8b949e',font:{size:9},maxTicksLimit:15},grid:{color:'#21262d'}},y:{ticks:{color:'#8b949e'},grid:{color:'#21262d'},beginAtZero:true}}
      },
      plugins:[{id:'trainLine2',afterDraw(chart){

        c.beginPath(); c.moveTo(x,top); c.lineTo(x,bottom); c.stroke(); c.restore();
      }}]
    });
  }
}

function fmtK(v){ return v>=1000000?'$'+(v/1000000).toFixed(1)+'M':v>=1000?'$'+(v/1000).toFixed(v>=100000?0:1)+'K':'$'+v; }
function fmtDiv(d){ return d.replace(/_/g,' ').replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase()); }

var _commSortCol = 'last3';

function renderDivTable(tab){
  const data = DIV_PERF[tab].slice().sort((a,b)=>b[_divSortCol]-a[_divSortCol]);
  const maxPacks = data.length ? data[0].packs : 1;
  const hdr = (label,key) => `<th style="cursor:pointer;user-select:none${_divSortCol===key?';color:#58a6ff':''}" onclick="_divSortCol='${key}';switchDivTab('${tab}')">${label}${_divSortCol===key?' ▼':''}</th>`;
  return `<table class="summary-table">
    <tr><th>#</th><th>Division</th>${hdr('Packs Sold','packs')}${hdr('Revenue','rev')}${hdr('Profit','profit')}</tr>
    ${data.map((d,i)=>`<tr>
      <td style="color:#484f58;font-weight:700">#${i+1}</td>
      <td><strong>${d.div}</strong></td>
      <td>${d.packs}<span class="rm-bar-wrap"><span class="rm-bar-fill" style="width:${Math.round(d.packs/maxPacks*100)}%"></span></span></td>
      <td style="color:#3fb950">${fmtK(d.rev)}</td>
      <td style="color:#8b949e">${fmtK(d.profit)}</td>
    </tr>`).join('')}
  </table>`;
}

/* ── CONVERSION BY DIVISION ── */
function showConvRates(period, value){
  selectedIdx = 'conv';
  renderSidebar();
  renderConvRates(period, value);
}

function renderConvRates(period, value){
  // period = 'yearly'|'quarterly'|'monthly'   value = '2025'|'2025-Q1'|'2025-01' etc.
  const src = CONV_DATA[period === 'yearly' ? 'yearly' : period === 'quarterly' ? 'quarterly' : 'monthly'];
  const _allMonths = [...new Set(CONV_DATA.monthly.map(d=>d.p))].sort();
  const _now = new Date();
  const _curP = _now.getFullYear()+'-'+String(_now.getMonth()+1).padStart(2,'0');
  const latestMonth = _allMonths[_allMonths.length-1]===_curP && _allMonths.length>1 ? _allMonths[_allMonths.length-2] : _allMonths[_allMonths.length-1];
  // Last completed quarter
  const _allQtrs = [...new Set((CONV_DATA.quarterly||[]).map(d=>d.p))].sort();
  const _curQ = _now.getFullYear()+'-'+String(Math.floor(_now.getMonth()/3)*3+1).padStart(2,'0');
  const latestQtr = _allQtrs[_allQtrs.length-1]===_curQ && _allQtrs.length>1 ? _allQtrs[_allQtrs.length-2] : _allQtrs[_allQtrs.length-1];
  // Last completed year
  const _allYrs = [...new Set((CONV_DATA.yearly||[]).map(d=>d.p))].sort();
  const _curY = String(_now.getFullYear());
  const latestYear = _allYrs[_allYrs.length-1]===_curY && _allYrs.length>1 ? _allYrs[_allYrs.length-2] : _allYrs[_allYrs.length-1];
  const _ce = document.getElementById('content');
  const _sv = _ce.scrollTop;

  // Period options
  const allPeriods = [...new Set(src.map(d=>d.p))].sort();

  // Default to last completed period if no value provided
  if(period === 'monthly' && !value) value = latestMonth;
  if(period === 'quarterly' && !value) value = latestQtr;
  if(period === 'yearly' && !value) value = latestYear;

  // For monthly: show per-division trend for selected division
  // For yearly/quarterly: show all divisions for selected period

  const fmtPeriod = p => {
    if(period==='yearly') return p.substring(0,4);
    if(period==='quarterly'){
      const d=new Date(p+'-15'); const q=Math.ceil((d.getMonth()+1)/3);
      return `Q${q} ${d.getFullYear()}`;
    }
    const d=new Date(p+'-15'); return d.toLocaleString('default',{month:'short',year:'numeric'});
  };

  // Build period selector buttons/dropdown
  const fmtMonthShort = p => { const d=new Date(p+'-15'); return d.toLocaleString('default',{month:'short'})+` '${d.getFullYear().toString().slice(2)}`; };
  const recentMonths = [...allPeriods].slice(-12);
  const latestP = allPeriods[allPeriods.length-1];
  const yoyP = latestP ? `${+latestP.slice(0,4)-1}-${latestP.slice(5,7)}` : null;
  const showYoy = yoyP && allPeriods.includes(yoyP) && !recentMonths.includes(yoyP);
  const displayMonths = showYoy ? [yoyP, ...recentMonths] : recentMonths;
  const periodTabs = (period==='monthly')
    ? `<select id="conv-period-sel" onchange="renderConvRates('monthly',this.value)" style="background:#161b22;border:1px solid #30363d;border-radius:6px;padding:5px 10px;color:#c9d1d9;font-size:12px;cursor:pointer">
        ${[...allPeriods].reverse().map(p=>`<option value="${p}"${p===value?' selected':''}>${fmtPeriod(p)}</option>`).join('')}
       </select>
       <span style="color:#484f58;font-size:12px;margin:0 2px">|</span>
       ${displayMonths.map((p,idx)=>{const isYoy=showYoy&&idx===0;const isActive=p===value;const sep=(showYoy&&idx===1)?'<span style="color:#30363d;margin:0 3px;font-size:11px">|</span>':'';return sep+`<button class="period-tab${isActive?' active':''}" onclick="renderConvRates('monthly','${p}')" style="${isYoy&&!isActive?'border-color:#e3b34188;color:#e3b341;background:#161b22;':''}white-space:nowrap;font-size:10px;padding:4px 8px">${fmtMonthShort(p)}${isYoy?' ↩':''}</button>`;}).join('')}`
    : allPeriods.map(p=>`<button class="period-tab${p===value?' active':''}" onclick="renderConvRates('${period}','${p}')">${fmtPeriod(p)}</button>`).join('');

  if(period === 'monthly' && value && !/^\d{4}-\d{2}$/.test(value)){
    // division picker + that division's trend chart
    const divs = [...new Set(src.map(d=>d.div))].sort();
    // value for monthly is "div|period" or just div initially
    let selDiv = value.includes('|') ? value.split('|')[0] : (value.length<=7 ? divs[0] : value);
    const divData = src.filter(d=>d.div===selDiv).sort((a,b)=>a.p.localeCompare(b.p));

    _ce.innerHTML = `
      <div style="margin-bottom:14px">
        <div style="font-size:22px;font-weight:700;color:#7ecfe0">📈 Conversion Rate by Division</div>
        <div style="font-size:13px;color:#8b949e;margin-top:3px">Eligible homes, packs sold, and ITM conversion rate</div>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center">
        <button style="background:#1f6feb;border:none;border-radius:6px;padding:5px 12px;color:#fff;font-size:11px;font-weight:600;cursor:pointer">Monthly</button>
        <button class="period-btn" onclick="renderConvRates('quarterly','${latestQtr}')">Quarterly</button>
        <button class="period-btn" onclick="renderConvRates('yearly','${latestYear}')">Yearly</button>
        <span style="color:#484f58;font-size:12px;margin:0 4px">|</span>
        <select id="conv-div-sel" onchange="renderConvRates('monthly',this.value)" style="background:#161b22;border:1px solid #30363d;border-radius:6px;padding:5px 10px;color:#c9d1d9;font-size:12px;cursor:pointer">
          ${divs.map(d=>`<option value="${d}"${d===selDiv?' selected':''}>${fmtDiv(d)}</option>`).join('')}
        </select>
      </div>
      <div class="full-chart-card">
        <h3>${fmtDiv(selDiv)} — Monthly Trend <span style="font-size:10px;font-weight:400;color:#484f58;margin-left:8px">Eligible Homes · Packs Sold · Conv. Rate %</span></h3>
        <div style="position:relative;height:320px"><canvas id="convMonthChart"></canvas></div>
      </div>
      <div class="full-chart-card">
        <h3 style="margin-bottom:10px">${fmtDiv(selDiv)} — Monthly Detail</h3>
        <table class="summary-table">
          <tr><th>Month</th><th>Eligible Homes</th><th>Packs Sold</th><th>Conv. Rate %</th><th>Home Closes</th></tr>
          ${(()=>{ const clm=(CLOSES_DATA||{}).monthly||[]; const clmo={}; clm.forEach(r=>{if(r.div===selDiv)clmo[r.p]=r.n;}); return divData.slice().reverse().map(d=>`<tr>
            <td>${fmtPeriod(d.p)}</td>
            <td style="color:#8b949e">${d.e.toLocaleString()}</td>
            <td style="color:#3fb950;font-weight:700">${d.pk}</td>
            <td style="color:${d.r>=5?'#3fb950':d.r>=2?'#f0a500':'#f85149'};font-weight:700">${d.r.toFixed(2)}%</td>
            <td style="color:#7ecfe0;font-weight:700">${clmo[d.p]!=null?clmo[d.p].toLocaleString():'—'}</td>
          </tr>`).join(''); })()}
        </table>
      </div>`;
    _ce.scrollTop = _sv;

    new Chart(document.getElementById('convMonthChart'),{
      type:'bar',
      data:{
        labels: divData.map(d=>fmtPeriod(d.p)),
        datasets:[
          {label:'Eligible Homes', data:divData.map(d=>d.e), backgroundColor:'#1f6feb', borderRadius:2, yAxisID:'y',
           datalabels:{anchor:'end',align:'end',color:'#8b949e',font:{size:8},formatter:v=>v>=1000?(v/1000).toFixed(1)+'k':v}},
          {label:'Packs Sold',     data:divData.map(d=>d.pk), backgroundColor:'#3fb950', borderRadius:2, yAxisID:'y',
           datalabels:{anchor:'end',align:'end',color:'#3fb950',font:{size:8}}},
          {label:'Conv. Rate %',   data:divData.map(d=>d.r), type:'line', borderColor:'#f85149', backgroundColor:'transparent', borderWidth:2, pointRadius:3, pointStyle:'line', yAxisID:'y2', tension:0.3,
           datalabels:{anchor:'center',align:'top',color:'#f85149',font:{size:8},formatter:v=>v==null?'':v.toFixed(1)+'%'}}
        ]
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        layout:{padding:{top:18}},
        interaction:{mode:'index',intersect:false},
        plugins:{
          legend:{labels:{color:'#8b949e',font:{size:11},usePointStyle:true}},
          tooltip:{callbacks:{label(ctx){ return ctx.dataset.yAxisID==='y2'?` Conv Rate: ${ctx.parsed.y.toFixed(2)}%`:` ${ctx.dataset.label}: ${ctx.parsed.y.toLocaleString()}`;}}}
        },
        scales:{
          x:{ticks:{color:'#8b949e',font:{size:9},maxRotation:45},grid:{color:'#21262d'}},
          y:{ticks:{color:'#8b949e',font:{size:11}},grid:{color:'#21262d'},beginAtZero:true,stacked:false},
          y2:{position:'right',ticks:{color:'#f85149',font:{size:11},callback:v=>v+'%'},grid:{display:false},beginAtZero:true}
        }
      },
      plugins:[ChartDataLabels]
    });
    return;
  }

  // Monthly (all-divs), Yearly, or Quarterly — all divisions for selected period

  // Build maps before sort so sort keys can reference them
  const closesSrc = (CLOSES_DATA||{})[period==='yearly'?'yearly':period==='quarterly'?'quarterly':'monthly'] || [];
  const closesMap = {};
  closesSrc.forEach(r=>{ closesMap[r.div+'|'+r.p] = r.n; });
  const getCloses = div => closesMap[div+'|'+value] || null;
  const ratifSrc = (RATIF_DATA||{})[period==='yearly'?'yearly':period==='quarterly'?'quarterly':'monthly'] || [];
  const ratifMap = {}; ratifSrc.forEach(r=>{ ratifMap[r.div+'|'+r.p]=r.n; });
  const getRatif = div => ratifMap[div+'|'+value] || null;
  // HST Direct — per-division from SS1_DATA
  const hstSrc = typeof SS1_DATA!=='undefined' ? (SS1_DATA[period==='yearly'?'yearly':period==='quarterly'?'quarterly':'monthly']||[]) : [];
  const hstMap = {}; hstSrc.forEach(r=>{ hstMap[r.div+'|'+r.p]=r.n; });
  const getHst = div => hstMap[div+'|'+value] || null;
  // HST Direct — global aggregate from DPUP_MONTHLY.hstDirect (for header total)
  const _hstLabels = DPUP_MONTHLY.labels;
  const _hstVals   = DPUP_MONTHLY.hstDirect;
  let totalHstCalc = 0;
  if (period === 'monthly') {
    // value is like '2026-03', labels are like 'Mar 26'
    const mi = _hstLabels.findIndex(l => {
      const [mon,yr] = l.split(' ');
      const mIdx = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'].indexOf(mon);
      const full = '20' + yr + '-' + String(mIdx+1).padStart(2,'0');
      return full === value;
    });
    if (mi >= 0 && _hstVals[mi] != null) totalHstCalc = _hstVals[mi];
  } else if (period === 'quarterly') {
    // value is like '2026-01' (Q1 start month)
    const qYear = value.substring(0,4);
    const qMonth = parseInt(value.substring(5,7));
    const qIdx = Math.floor((qMonth-1)/3);
    const months = [qIdx*3, qIdx*3+1, qIdx*3+2];
    months.forEach(mi => {
      const label = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][mi] + ' ' + qYear.substring(2);
      const idx = _hstLabels.indexOf(label);
      if (idx >= 0 && _hstVals[idx] != null) totalHstCalc += _hstVals[idx];
    });
  } else if (period === 'yearly') {
    // value is like '2026'
    const yr = value.substring(2);
    _hstLabels.forEach((l, i) => {
      if (l.endsWith(yr) && _hstVals[i] != null) totalHstCalc += _hstVals[i];
    });
  }

  // PO Status lookup for conv rate view
  const getPO = div => {
    if(typeof PO_STATUS==='undefined') return null;
    const e = Object.entries(PO_STATUS).find(([k])=>k.replace(/^\d+-/,'')===div);
    return e ? e[1] : null;
  };

  const getDivSortVal = d => {
    if(divSortBy==='e')      return d.e;
    if(divSortBy==='r')      return d.r;
    if(divSortBy==='ratif')  return ratifMap[d.div+'|'+value]||0;
    if(divSortBy==='closes') return closesMap[d.div+'|'+value]||0;
    if(divSortBy==='proj')   return PROJ_HOMES_2026[d.div]||0;
    if(divSortBy==='hst')    return hstMap[d.div+'|'+value]||0;
    if(divSortBy==='po_i')   { const p=getPO(d.div); return p?p.i:0; }
    if(divSortBy==='po_m1')  { const p=getPO(d.div); return p?p.m1:0; }
    return d.pk; // 'pk' default
  };
  const rows = src.filter(d=>d.p===value).sort((a,b)=>getDivSortVal(b)-getDivSortVal(a));
  const totalE      = rows.reduce((s,d)=>s+d.e,0);
  const totalPk     = rows.reduce((s,d)=>s+d.pk,0);
  const avgRate     = totalE>0 ? (totalPk/totalE*100).toFixed(2) : 0;
  const totalRatif  = rows.reduce((s,d)=>s+(ratifMap[d.div+'|'+value]||0),0);
  const totalCloses = rows.reduce((s,d)=>s+(closesMap[d.div+'|'+value]||0),0);
  const totalHstDiv = rows.reduce((s,d)=>s+(hstMap[d.div+'|'+value]||0),0);
  const totalHst    = totalHstDiv || totalHstCalc;

  _ce.innerHTML = `
    <div style="position:sticky;top:0;z-index:50;background:#0d1117;padding-bottom:10px">
    <div style="margin-bottom:14px">
      <div style="font-size:22px;font-weight:700;color:#7ecfe0">📈 Conversion Rate by Division</div>
      <div style="font-size:13px;color:#8b949e;margin-top:3px">Eligible homes, packs sold, and ITM conversion rate · ${fmtPeriod(value)}</div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center">
      <button class="period-btn${period==='monthly'?' active':''}" onclick="renderConvRates('monthly','${period==='monthly'?value:latestMonth}')">Monthly</button>
      <button class="period-btn${period==='quarterly'?' active':''}" onclick="renderConvRates('quarterly','${period==='quarterly'?value:latestQtr}')">Quarterly</button>
      <button class="period-btn${period==='yearly'?' active':''}" onclick="renderConvRates('yearly','${period==='yearly'?value:latestYear}')">Yearly</button>
      <span style="color:#484f58;font-size:12px;margin:0 4px">|</span>
      ${periodTabs}
    </div>
    <div class="rm-stats" style="margin-bottom:16px">
      <div class="rm-stat"><div class="rm-stat-val" style="color:#8b949e">${rows.length}</div><div class="rm-stat-label">Divisions</div></div>
      <div class="rm-stat" style="cursor:pointer;${divSortBy==='e'?'border-color:#7ecfe0;box-shadow:0 0 8px 2px rgba(126,207,224,0.4);':''}" onclick="divSortBy='e';renderConvRates('${period}','${value}')" title="Sort by Eligible Homes"><div class="rm-stat-val teal">${totalE.toLocaleString()}</div><div class="rm-stat-label">Eligible Homes${divSortBy==='e'?' ↓':''}</div></div>
      <div class="rm-stat" style="cursor:pointer;${divSortBy==='pk'?'border-color:#1f6feb;box-shadow:0 0 8px 2px rgba(31,111,235,0.4);':''}" onclick="divSortBy='pk';renderConvRates('${period}','${value}')" title="Sort by Packs Sold"><div class="rm-stat-val" style="color:#1f6feb">${totalPk.toLocaleString()}</div><div class="rm-stat-label">Packs Sold${divSortBy==='pk'?' ↓':''}</div></div>
      <div class="rm-stat" style="cursor:pointer;${divSortBy==='r'?'border-color:#3fb950;box-shadow:0 0 8px 2px rgba(63,185,80,0.4);':''}" onclick="divSortBy='r';renderConvRates('${period}','${value}')" title="Sort by Conv. Rate"><div class="rm-stat-val" style="color:#3fb950">${avgRate}%</div><div class="rm-stat-label">Conv. Rate%${divSortBy==='r'?' ↓':''}</div></div>
      <div class="rm-stat" style="cursor:pointer;${divSortBy==='ratif'?'border-color:#7ecfe0;box-shadow:0 0 8px 2px rgba(126,207,224,0.4);':''}" onclick="divSortBy='ratif';renderConvRates('${period}','${value}')" title="Sort by Ratifications"><div class="rm-stat-val" style="color:#7ecfe0">${totalRatif.toLocaleString()}</div><div class="rm-stat-label">Ratifications${divSortBy==='ratif'?' ↓':''}</div></div>
      <div class="rm-stat" style="cursor:pointer;${divSortBy==='closes'?'border-color:#f0a500;box-shadow:0 0 8px 2px rgba(240,165,0,0.4);':''}" onclick="divSortBy='closes';renderConvRates('${period}','${value}')" title="Sort by Closes"><div class="rm-stat-val" style="color:#f0a500">${totalCloses.toLocaleString()}</div><div class="rm-stat-label">Closes${divSortBy==='closes'?' ↓':''}</div></div>
      <div class="rm-stat" style="cursor:pointer;${divSortBy==='hst'?'border-color:#f778ba;box-shadow:0 0 8px 2px rgba(247,120,186,0.4);':''}" onclick="divSortBy='hst';renderConvRates('${period}','${value}')" title="Sort by HST Direct"><div class="rm-stat-val" style="color:#f778ba">${totalHst.toLocaleString()}</div><div class="rm-stat-label">HST Direct${divSortBy==='hst'?' ↓':''}</div></div>
    </div>
    </div>
    <div class="full-chart-card">
      <h3>${fmtPeriod(value)} — All Divisions <span style="font-size:10px;font-weight:400;color:#484f58;margin-left:8px">sorted by ${divSortBy==='e'?'eligible homes':divSortBy==='r'?'conv. rate':divSortBy==='ratif'?'ratifications':divSortBy==='closes'?'closes':divSortBy==='hst'?'HST Direct':divSortBy==='proj'?'proj. homes':'packs sold'} · click a bar to see monthly detail</span></h3>
      <div style="position:relative;height:320px"><canvas id="convDivChart"></canvas></div>
    </div>
    <div class="full-chart-card">
      <h3>Division Pipeline — ${fmtPeriod(value)} <span style="font-size:10px;font-weight:400;color:#484f58;margin-left:8px">Eligible pool · Ratifications · Closes · Packs Sold · HST Direct — sorted by ${divSortBy==='e'?'eligible homes':divSortBy==='r'?'conv. rate':divSortBy==='ratif'?'ratifications':divSortBy==='closes'?'closes':divSortBy==='hst'?'HST Direct':divSortBy==='proj'?'proj. homes':'packs sold'}</span></h3>
      <div style="position:relative;height:580px"><canvas id="pipelineChart"></canvas></div>
    </div>
    <div class="full-chart-card">

function renderSummary(){
  const _ce = document.getElementById('content');

  // ── Aggregate all divisions from latest yearly data ──
  const latestYear = (CONV_DATA?.yearly||[]).map(d=>d.p).sort().pop() || '2025';
  const yearRows = CONV_DATA.yearly.filter(d=>d.p===latestYear).sort((a,b)=>b.pk-a.pk);
  const totalPk = yearRows.reduce((s,d)=>s+d.pk,0);
  const totalE = yearRows.reduce((s,d)=>s+d.e,0);
  const avgConv = totalE>0?(totalPk/totalE*100):0;

  // Closes & ratifs for latest year
  const clYear = (CLOSES_DATA?.yearly||[]).filter(d=>d.p===latestYear);
  const clMap = {}; clYear.forEach(d=>{clMap[d.div]=d.n;});
  const ratYear = (RATIF_DATA?.yearly||[]).filter(d=>d.p===latestYear);
  const ratMap = {}; ratYear.forEach(d=>{ratMap[d.div]=d.n;});
  const hstYear = (typeof SS1_DATA!=='undefined'?(SS1_DATA?.yearly||[]):[]).filter(d=>d.p===latestYear);
  const hstMap = {}; hstYear.forEach(d=>{hstMap[d.div]=d.n;});

  // ── Total closes by period (aggregate all divisions) ──
  const closesMonthlyAll = (CLOSES_DATA?.monthly||[]);
  const allClosePeriods = [...new Set(closesMonthlyAll.map(d=>d.p))].sort();
  const closesByPeriod = {};
  closesMonthlyAll.forEach(d=>{ closesByPeriod[d.p] = (closesByPeriod[d.p]||0) + d.n; });
  const last12ClosePeriods = allClosePeriods.slice(-12);
  const last3ClosePeriods = allClosePeriods.slice(-3);
  const totalClosesL12 = last12ClosePeriods.reduce((s,p)=>s+(closesByPeriod[p]||0),0);
  const totalClosesL3 = last3ClosePeriods.reduce((s,p)=>s+(closesByPeriod[p]||0),0);

  // ── Program analysis from DPUP_MONTHLY ──
  const labels = DPUP_MONTHLY.labels;
  const progData = {};
  ['ITM','spec','incentive','model','hstDirect'].forEach(k=>{
    const arr = DPUP_MONTHLY[k]||[];
    const valid = arr.filter(v=>v!==null);
    const last12 = valid.slice(-12);
    const prev12 = valid.slice(-24,-12);
    const l12sum = last12.reduce((a,b)=>a+b,0);
    const p12sum = prev12.reduce((a,b)=>a+b,0);
    const yoy = p12sum>0?((l12sum-p12sum)/p12sum*100):0;
    const trend = trendDir(last12);
    const avg = last12.length>0?(l12sum/last12.length):0;
    const last3sum = valid.slice(-3).reduce((a,b)=>a+b,0);
    const convL12 = totalClosesL12>0 ? (l12sum/totalClosesL12*100) : 0;
    const convL3 = totalClosesL3>0 ? (last3sum/totalClosesL3*100) : 0;
    progData[k] = {total:valid.reduce((a,b)=>a+b,0), last12:l12sum, prev12:p12sum, yoy, trend, avg, last3:last3sum, convL12, convL3};
  });

  // ── Revenue/profit analysis ──
  const revAll = ITM_MONTHLY.revenue.filter(v=>v!==null);
  const profAll = ITM_MONTHLY.profit.filter(v=>v!==null);
  const revL12 = revAll.slice(-12).reduce((a,b)=>a+b,0);
  const revP12 = revAll.slice(-24,-12).reduce((a,b)=>a+b,0);
  const revYoy = revP12>0?((revL12-revP12)/revP12*100):0;
  const profL12 = profAll.slice(-12).reduce((a,b)=>a+b,0);

  // ── Build division ranking table ──
  const divRows = yearRows.map((d,i)=>{
    const cl = clMap[d.div]||0;
    const rat = ratMap[d.div]||0;
    const hst = hstMap[d.div]||0;
    const score = d.pk*2 + d.r*10 + (hst>0?5:0); // composite score
    return {...d, cl, rat, hst, rank:i+1, score};
  }).sort((a,b)=>b.score-a.score);
  divRows.forEach((d,i)=>d.compositeRank=i+1);
  divRows.sort((a,b)=>b.pk-a.pk); // back to packs sort for display

  // ── Identify problems and strengths ──
  const topDivs = divRows.filter(d=>d.pk>=divRows[0].pk*0.3).slice(0,5);
  const bottomDivs = divRows.filter(d=>d.pk>0).slice(-5).reverse();
  const zeroDivs = divRows.filter(d=>d.pk===0);
  const decliningDivs = divRows.filter(d=>{
    const monthly = CONV_DATA.monthly.filter(m=>m.div===d.div).sort((a,b)=>a.p.localeCompare(b.p));
    return trendDir(monthly.slice(-6).map(m=>m.pk))==='declining';
  });

  // ── Program health cards ──
  function progCard(name, key, color){
    const p = progData[key];
    if(!p) return '';
    const trendIcon = p.trend==='improving'?'↑':p.trend==='declining'?'↓':'→';
    const trendColor = p.trend==='improving'?'#3fb950':p.trend==='declining'?'#f85149':'#f0a500';
    const yoyColor = p.yoy>5?'#3fb950':p.yoy<-5?'#f85149':'#f0a500';
    const convL12Color = p.convL12>=2?'#3fb950':p.convL12>=1?'#f0a500':'#f85149';
    const convL3Color = p.convL3>=2?'#3fb950':p.convL3>=1?'#f0a500':'#f85149';
    return `<div style="background:#161b22;border:1px solid #21262d;border-radius:8px;padding:14px 16px;border-top:3px solid ${color}">
      <div style="font-size:13px;font-weight:700;color:${color};margin-bottom:8px">${name}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:11px">
        <div><span style="color:#8b949e">Last 12mo:</span> <strong>${p.last12.toLocaleString()}</strong></div>
        <div><span style="color:#8b949e">Avg/mo:</span> <strong>${p.avg.toFixed(1)}</strong></div>
        <div><span style="color:#8b949e">YoY:</span> <strong style="color:${yoyColor}">${p.yoy>=0?'+':''}${p.yoy.toFixed(0)}%</strong></div>
        <div><span style="color:#8b949e">Trend:</span> <strong style="color:${trendColor}">${trendIcon} ${p.trend}</strong></div>
        <div><span style="color:#8b949e">Last 3mo:</span> <strong>${p.last3}</strong></div>
        <div><span style="color:#8b949e">All-time:</span> <strong>${p.total.toLocaleString()}</strong></div>
      </div>
      <div style="border-top:1px solid #21262d;margin-top:8px;padding-top:8px;display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:11px">
        <div><span style="color:#8b949e">Conv (12mo):</span> <strong style="color:${convL12Color}">${p.convL12.toFixed(2)}%</strong></div>
        <div><span style="color:#8b949e">Conv (3mo):</span> <strong style="color:${convL3Color}">${p.convL3.toFixed(2)}%</strong></div>
      </div>
      <div style="font-size:9px;color:#484f58;margin-top:4px">Packs ÷ Total Closes (${totalClosesL12.toLocaleString()} L12 / ${totalClosesL3.toLocaleString()} L3)</div>
    </div>`;
  }

  // ── Honest program assessment ──
  // Context: 125 divisions / ~86K homes in 2023-2025. Lost ~10 divs Oct-Dec 2025.
  // Went from 125 → 27 divisions on Jan 1, 2026 (~78% reduction).
  // Volume declines are EXPECTED. Conversion rates are the real signal.
  const progIssues = [];
  const progStrengths = [];
  const context = [];

  // Division reduction context — always show this
  context.push('Division footprint dropped from 125 → 27 on Jan 1, 2026 (~78% reduction, ~86K homes → ~22K). Volume declines across all programs are expected and do NOT indicate program failure.');

  // Evaluate trends in context of the contraction
  // For volume metrics, only flag if per-division rate is declining
  const activeDivCount = yearRows.length || 27;
  const priorDivCount = 125;
  const contractionRatio = activeDivCount / priorDivCount;

  // ITM
  if(progData.ITM.last3 > 0) {
    const perDivRate3 = progData.ITM.last3 / 3 / activeDivCount;
    const perDivRate12 = progData.ITM.last12 / 12 / (progData.ITM.prev12 > 0 ? priorDivCount : activeDivCount);
    if(progData.ITM.convL3 > progData.ITM.convL12) progStrengths.push(`ITM conversion rate is improving: ${progData.ITM.convL3.toFixed(2)}% (last 3mo) vs ${progData.ITM.convL12.toFixed(2)}% (last 12mo) — the remaining divisions are converting better.`);
    else if(progData.ITM.convL3 < progData.ITM.convL12 * 0.8) progIssues.push(`ITM conversion rate declining even within remaining divisions: ${progData.ITM.convL3.toFixed(2)}% (3mo) vs ${progData.ITM.convL12.toFixed(2)}% (12mo).`);
  }
  if(progData.ITM.yoy < -50) progStrengths.push(`ITM volume down ${Math.abs(progData.ITM.yoy).toFixed(0)}% YoY — but this is largely explained by the 78% division reduction, not program weakness.`);
  else if(progData.ITM.yoy > -30 && progData.ITM.yoy < 0) progStrengths.push(`ITM only down ${Math.abs(progData.ITM.yoy).toFixed(0)}% YoY despite losing 78% of divisions — the remaining 27 divisions are carrying disproportionate weight. Strong per-division performance.`);

  // HST Direct
  if(progData.hstDirect.last12 > progData.ITM.last12) progStrengths.push('HST Direct still outpacing ITM in volume — the direct-sell channel continues to deliver even with fewer divisions.');
  if(progData.hstDirect.convL3 > 0) progStrengths.push(`HST Direct conversion: ${progData.hstDirect.convL3.toFixed(2)}% (3mo). This channel reaches buyers who never attend ITM events.`);

  // Spec
  if(progData.spec.convL3 > progData.spec.convL12) progStrengths.push(`Spec pack conversion improving: ${progData.spec.convL3.toFixed(2)}% (3mo) vs ${progData.spec.convL12.toFixed(2)}% (12mo).`);
  else if(progData.spec.last3 === 0) progIssues.push('Spec packs have gone to zero in the last 3 months — are remaining divisions not building specs, or are they not being captured?');

  // Model
  if(progData.model.last3 > 0) progStrengths.push(`Model home packs still active (${progData.model.last3} last 3mo) — passive selling infrastructure is intact in remaining divisions.`);
  else progIssues.push('Model home packs at zero — the passive selling channel needs attention in the 27 remaining divisions.');

  // Incentive
  if(progData.incentive.last3 > progData.ITM.last3 * 0.3) progStrengths.push(`Incentive program contributing meaningfully (${progData.incentive.last3} packs last 3mo) — builder incentives are driving sales.`);

  // Revenue — expected to decline with division loss
  if(revYoy < -50) context.push(`Revenue down ${Math.abs(revYoy).toFixed(0)}% YoY — expected given 78% fewer divisions. Focus metric: revenue per division, not total revenue.`);
  else if(revYoy < 0 && revYoy >= -50) progStrengths.push(`Revenue only down ${Math.abs(revYoy).toFixed(0)}% YoY despite 78% division reduction — remaining divisions are pulling above their weight.`);

  // Conversion rate — the real signal
  if(avgConv > 1.5) progStrengths.push(`Overall conversion rate of ${avgConv.toFixed(2)}% across remaining divisions — this is the metric that matters post-contraction.`);
  else if(avgConv < 1.0) progIssues.push(`Overall conversion rate of ${avgConv.toFixed(2)}% is low — even with concentrated divisions, packs-per-close needs improvement.`);

  // Division health
  if(zeroDivs.length > 0) progIssues.push(`${zeroDivs.length} of ${activeDivCount} remaining divisions have ZERO packs in ${latestYear} — with only 27 divisions, every one counts.`);
  if(decliningDivs.length > activeDivCount * 0.4) progIssues.push(`${decliningDivs.length} of ${activeDivCount} divisions trending down — that is ${Math.round(decliningDivs.length/activeDivCount*100)}% of the remaining footprint.`);

  _ce.innerHTML = `
    <div style="margin-bottom:18px">
      <div style="font-size:22px;font-weight:700;color:#f85149">📊 Performance Summary — Brutally Honest</div>
      <div style="font-size:13px;color:#8b949e;margin-top:3px">All programs, all divisions · Data through ${labels[labels.length-1]} · ${latestYear} focus</div>
    </div>

    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:18px">
      ${progCard('ITM','ITM','#3fb950')}
      ${progCard('Spec','spec','#1f6feb')}
      ${progCard('Incentive','incentive','#d2a8ff')}
      ${progCard('Model Home','model','#7ecfe0')}
      ${progCard('HST Direct','hstDirect','#f778ba')}
    </div>

    ${context.length>0?`<div class="dd-assess" style="border-left:3px solid #f0a500;margin-bottom:14px">
      <h4 style="color:#f0a500;font-size:11px">CONTEXT: DIVISION CONTRACTION</h4>
      ${context.map(s=>`<p style="font-size:11px;color:var(--text-m);margin-bottom:4px">${s}</p>`).join('')}
    </div>`:''}

    <div class="dd-assess" style="border-left:3px solid ${progIssues.length>progStrengths.length?'#f85149':'#3fb950'};margin-bottom:12px">
      <h4 style="color:${progIssues.length>progStrengths.length?'#f85149':'#3fb950'}">HEALTH CHECK</h4>
      ${(()=>{
        const all = progStrengths.map(s=>`<p class="flag green" style="font-size:11px">+ ${s}</p>`).concat(progIssues.map(s=>`<p class="flag red" style="font-size:11px">- ${s}</p>`));
        const half = Math.ceil(all.length/2);
        return `<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
          <div>${all.slice(0,half).join('')}</div>
          <div>${all.slice(half).join('')}</div>
        </div>`;
      })()}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px;align-items:start">
      <div class="dd-assess" style="border-left:3px solid #f85149;margin-bottom:0">
        <h4 style="color:#f85149">NEEDS ATTENTION</h4>
        ${decliningDivs.length>0?decliningDivs.map(d=>{
          const monthly = CONV_DATA.monthly.filter(m=>m.div===d.div).sort((a,b)=>a.p.localeCompare(b.p));
          const last6 = monthly.slice(-6);
          const avgPk = last6.length>0?(last6.reduce((s,m)=>s+m.pk,0)/last6.length).toFixed(1):'?';
          return `<p class="flag red" style="font-size:11px">- <strong>${fmtDiv(d.div)}</strong>: ${avgPk} pk/mo, ${d.r.toFixed(2)}%</p>`;
        }).join(''):'<p class="flag muted" style="font-size:11px">No declining divisions detected.</p>'}
      </div>
      <div class="dd-assess" style="border-left:3px solid #3fb950;margin-bottom:0">
        <h4 style="color:#3fb950">TOP PERFORMERS</h4>
        ${topDivs.length>0?topDivs.map(d=>`<p class="flag green" style="font-size:11px">+ <strong>${fmtDiv(d.div)}</strong>: ${d.pk} pk, ${d.r.toFixed(2)}%${d.hst>0?' · HST:'+d.hst:''}</p>`).join(''):'<p class="flag muted" style="font-size:11px">No standout performers.</p>'}
      </div>
    </div>

    <div class="full-chart-card" style="margin-bottom:18px">
      <h3>Division Rankings — ${latestYear} <span style="font-size:10px;font-weight:400;color:#484f58">Sorted by packs sold · Color = conversion rate tier</span></h3>
      <table class="summary-table">
        <tr><th>#</th><th>Division</th><th style="color:#d2a8ff">Proj. Homes '26</th><th>Packs</th><th>Conv %</th><th>Eligible</th><th>Closes</th><th>Ratifs</th><th>HST</th><th>Verdict</th></tr>
        ${divRows.filter(d=>d.pk>0||d.e>20).map((d,i)=>{
          const convColor = d.r>=3?'#3fb950':d.r>=1.5?'#f0a500':'#f85149';
          const monthly = CONV_DATA.monthly.filter(m=>m.div===d.div).sort((a,b)=>a.p.localeCompare(b.p));
          const t = trendDir(monthly.slice(-6).map(m=>m.pk));
          const tIcon = t==='improving'?'<span style="color:#3fb950">↑</span>':t==='declining'?'<span style="color:#f85149">↓</span>':'<span style="color:#8b949e">→</span>';
          const ph = PROJ_HOMES_2026[d.div]||null;
          const verdict = d.r>=3&&t!=='declining'?'<span style="color:#3fb950;font-weight:700">Strong</span>':
            d.r>=1.5&&t!=='declining'?'<span style="color:#f0a500;font-weight:700">OK</span>':
            d.pk===0?'<span style="color:#f85149;font-weight:700">Dead</span>':
            t==='declining'?'<span style="color:#f85149;font-weight:700">Declining</span>':
            '<span style="color:#f85149;font-weight:700">Weak</span>';
          return `<tr>
            <td style="color:#484f58;font-weight:700">#${i+1}</td>

        <div style="font-size:11px;color:${revYoy>=0?'#3fb950':'#f85149'};font-weight:700;margin-top:4px">${revYoy>=0?'+':''}${revYoy.toFixed(0)}% YoY</div>

        <div style="font-size:26px;font-weight:800;color:var(--text-h)">${fmtK(profL12)}</div>
        <div style="font-size:11px;color:#8b949e;margin-top:4px">Avg conv rate: ${avgConv.toFixed(2)}%</div>
      </div>
    </div>
  `;
}

function renderRainmakers(filter, divFilter, sortBy='t'){
  const divs = [...new Set(RAINMAKERS.map(r=>r.d))].sort();
  const getSV = (r,k) => k==='rev' ? r.p25*2700+r.p10*1125+r.p8*399 : (r[k]||0);
  const isNew = r => typeof RAINMAKERS_BASELINE !== 'undefined' && !RAINMAKERS_BASELINE.has(r.n.trim().toLowerCase());
  const newAgents = RAINMAKERS.filter(isNew).slice().sort((a,b)=>b.t-a.t);
  const filtered = RAINMAKERS.filter(r=>{
    const nameMatch = !filter || r.n.toLowerCase().includes(filter.toLowerCase());
    const divMatch  = !divFilter || r.d === divFilter;
    return nameMatch && divMatch;
  }).slice().sort((a,b)=> getSV(b,sortBy) - getSV(a,sortBy));
  const totalPacks = filtered.reduce((s,r)=>s+r.t,0);
  const total25    = filtered.reduce((s,r)=>s+r.p25,0);
  const total10    = filtered.reduce((s,r)=>s+r.p10,0);
  const total8     = filtered.reduce((s,r)=>s+r.p8,0);
  const totalRev   = filtered.reduce((s,r)=>s+(r.p25*2700+r.p10*1125+r.p8*399),0);
  const totalL3    = filtered.reduce((s,r)=>s+(r.l3||0),0);
  const totalH3    = filtered.reduce((s,r)=>s+(r.h3||0),0);
  const maxVal     = filtered.length ? getSV(filtered[0], sortBy) : 1;

  document.getElementById('content').innerHTML = `
    <div style="margin-bottom:14px">
      <div style="font-size:22px;font-weight:700;color:#f0a500">🏆 Rainmakers</div>
      <div style="font-size:13px;color:#8b949e;margin-top:3px">Sorted by: <strong style="color:#e6edf3">${sortBy==='p25'?'25-Pack':sortBy==='p10'?'10-Pack':sortBy==='p8'?'8-Pack':sortBy==='l3'?'Packs Sold (3 Mo.)':sortBy==='h3'?'Homes Sold':sortBy==='rev'?'Deako Revenue':'Total Packs'}</strong> · ${filtered.length.toLocaleString()} agents · click stat boxes to re-sort</div>
    </div>
    <div class="rm-stats">
      <div class="rm-stat"><div class="rm-stat-val teal">${filtered.length.toLocaleString()}</div><div class="rm-stat-label">Agents</div></div>
      <div class="rm-stat"><div class="rm-stat-val" style="color:#8b949e">${[...new Set(filtered.map(r=>r.d))].length}</div><div class="rm-stat-label">Divisions</div></div>
      <div class="rm-stat" style="cursor:pointer;${sortBy==='t'?'border-color:#f0a500;':''}" onclick="renderRainmakers('${filter}','${divFilter}','t')" title="Sort by Total Packs"><div class="rm-stat-val">${totalPacks.toLocaleString()}</div><div class="rm-stat-label">Total Packs${sortBy==='t'?' ↓':''}</div></div>
      <div class="rm-stat" style="cursor:pointer;${sortBy==='l3'?'border-color:#d2a8ff;':''}" onclick="renderRainmakers('${filter}','${divFilter}','l3')" title="Sort by Packs Sold (3 Mo.)"><div class="rm-stat-val" style="color:#d2a8ff">${totalL3.toLocaleString()}</div><div class="rm-stat-label">Packs Sold (3 Mo.)${sortBy==='l3'?' ↓':''}</div></div>
      <div class="rm-stat" style="cursor:pointer;${sortBy==='h3'?'border-color:#7ecfe0;':''}" onclick="renderRainmakers('${filter}','${divFilter}','h3')" title="Sort by Homes Sold"><div class="rm-stat-val" style="color:#7ecfe0">${totalH3.toLocaleString()}</div><div class="rm-stat-label">Homes Sold (3 Mo.)${sortBy==='h3'?' ↓':''}</div></div>
      <div class="rm-stat" style="cursor:pointer;${sortBy==='p25'?'border-color:#3fb950;':''}" onclick="renderRainmakers('${filter}','${divFilter}','p25')" title="Sort by 25-Pack"><div class="rm-stat-val" style="color:#3fb950">${total25.toLocaleString()}</div><div class="rm-stat-label">25-Pack${sortBy==='p25'?' ↓':''}</div></div>
      <div class="rm-stat" style="cursor:pointer;${sortBy==='p10'?'border-color:#79c0ff;':''}" onclick="renderRainmakers('${filter}','${divFilter}','p10')" title="Sort by 10-Pack"><div class="rm-stat-val" style="color:#79c0ff">${total10.toLocaleString()}</div><div class="rm-stat-label">10-Pack${sortBy==='p10'?' ↓':''}</div></div>
      <div class="rm-stat" style="cursor:pointer;${sortBy==='p8'?'border-color:#f0a500;':''}" onclick="renderRainmakers('${filter}','${divFilter}','p8')" title="Sort by 8-Pack"><div class="rm-stat-val orange">${total8.toLocaleString()}</div><div class="rm-stat-label">8-Pack${sortBy==='p8'?' ↓':''}</div></div>
      <div class="rm-stat" style="cursor:pointer;${sortBy==='rev'?'border-color:#3fb950;':''}" onclick="renderRainmakers('${filter}','${divFilter}','rev')" title="Sort by Deako Revenue"><div class="rm-stat-val" style="color:#3fb950">$${totalRev.toLocaleString()}</div><div class="rm-stat-label">Deako Revenue${sortBy==='rev'?' ↓':''}</div></div>
    </div>
    ${newAgents.length ? `
    <div class="full-chart-card" style="background:#161b22;border:1px solid #30363d;border-left:3px solid #f0a500;padding:12px 16px;margin-bottom:12px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <span style="font-size:14px;font-weight:700;color:#f0a500">✨ Potential New Agents</span>
        <span style="font-size:11px;color:#8b949e">${newAgents.length} agent${newAgents.length>1?'s':''} appearing for the first time since the baseline report · click name to filter</span>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">
        ${newAgents.map(r => `<span style="display:inline-flex;gap:6px;align-items:center;background:#21262d;border:1px solid #30363d;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer" onclick="renderRainmakers('${r.n.replace(/'/g,String.fromCharCode(39))}','','${sortBy}')"><strong style="color:#e6edf3">${r.n}</strong><span style="color:#79c0ff;font-size:11px">${r.d}</span><span style="color:#3fb950;font-weight:700">${r.t} pack${r.t!==1?'s':''}</span></span>`).join('')}
      </div>
    </div>` : ''}
    <div class="rm-controls">
      <input type="text" id="rm-search" placeholder="Search agent name..." value="${filter}" oninput="renderRainmakers(this.value, document.getElementById('rm-div').value, '${sortBy}')">
      <select id="rm-div" onchange="renderRainmakers(document.getElementById('rm-search').value, this.value, '${sortBy}')">
        <option value="">All Divisions</option>
        ${divs.map(d=>`<option value="${d}"${d===divFilter?' selected':''}>${d}</option>`).join('')}
      </select>
    </div>
    <div style="background:#161b22;border:1px solid #21262d;border-radius:10px;overflow:hidden">
      <table class="rm-table">
        <tr><th>#</th><th>Agent</th><th style="${divFilter?'cursor:pointer;color:#f0a500':''}" title="${divFilter?'Click to clear division filter':''}" onclick="${divFilter?`renderRainmakers('${filter.replace(/'/g,"\\'")}','','${sortBy}')`:''}">Division${divFilter?` → ALL`:''}</th><th>Community</th><th>Homes Sold</th><th>Packs Sold (3 Mo.)</th><th>Total Packs</th><th>Deako Revenue</th><th>Pack Mix</th><th>Contact</th></tr>
        ${filtered.slice(0,200).map((r,i)=>{
          const pct = Math.round(getSV(r,sortBy)/maxVal*100);
          const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
          const rev = r.p25*2700 + r.p10*1125 + r.p8*399;
          const hasBoth = r.em && r.ph;
          const contactHtml = hasBoth
            ? `<div class="contact-wrap">📇<div class="contact-tip"><div class="contact-tip-row">📧 <a href="mailto:${r.em}">${r.em}</a></div><div class="contact-tip-row">📞 <a href="tel:${r.ph}">${r.ph}</a></div></div></div>`
            : r.em ? `<a href="mailto:${r.em}" title="${r.em}" style="color:#7ecfe0;text-decoration:none">📧</a>`
            : r.ph ? `<a href="tel:${r.ph}" title="${r.ph}" style="color:#3fb950;text-decoration:none">📞</a>`
            : '';
          return `<tr>
            <td class="rm-rank${i<3?' top3':''}">${medal||('#'+(i+1))}</td>
            <td><strong>${r.n}</strong></td>
            <td style="color:#79c0ff;cursor:pointer;text-decoration:underline dotted" title="Filter by ${r.d}" onclick="renderRainmakers('','${r.d.replace(/'/g,String.fromCharCode(39))}','${sortBy}')">${r.d}</td>
            <td style="color:#8b949e;font-size:11px">${r.cm||'—'}</td>
            <td style="color:#7ecfe0;font-weight:700">${r.h3||0}</td>
            <td style="color:#d2a8ff;font-weight:700">${r.l3||0}</td>
            <td><strong>${r.t}</strong><span class="rm-bar-wrap"><span class="rm-bar-fill" style="width:${pct}%"></span></span></td>
            <td style="color:#3fb950;font-weight:700">$${rev.toLocaleString()}</td>
            <td>
              ${r.p25>0?`<span class="rm-pack-badge rm-p25">25×${r.p25}</span>`:''}
              ${r.p10>0?`<span class="rm-pack-badge rm-p10">10×${r.p10}</span>`:''}
              ${r.p8>0?`<span class="rm-pack-badge rm-p8">8×${r.p8}</span>`:''}
            </td>
            <td style="text-align:center">${contactHtml}</td>
          </tr>`;
        }).join('')}
        ${filtered.length>200?`<tr><td colspan="10" style="text-align:center;color:#484f58;padding:10px">Showing top 200 of ${filtered.length} — refine search to see more</td></tr>`:''}
      </table>
    </div>
  `;
}

}
