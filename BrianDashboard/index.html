html,body{height:100%;background:#0d1117;font-family:system-ui,-apple-system,sans-serif;color:#c9d1d9;overflow:hidden}
body{display:flex;flex-direction:column;height:100vh}

/* HEADER */
#header{background:#161b22;border-bottom:1px solid #21262d;padding:10px 20px;flex-shrink:0;display:flex;align-items:center;gap:0}
#header-title{width:160px;flex-shrink:0;padding-right:12px}
#header h1{font-size:17px;font-weight:700;color:#e6edf3;letter-spacing:.02em;white-space:nowrap}
.header-sub{font-size:11px;color:#8b949e;background:#0d1117;padding:2px 8px;border-radius:10px;font-weight:600}

/* METRICS BAR */
#metrics-bar{flex:1;display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:center}
.hmetric{background:#0d1117;border:1px solid #21262d;border-radius:8px;padding:7px 14px;display:flex;flex-direction:column;min-width:90px}
.hmetric-label{font-size:10px;color:#8b949e;letter-spacing:.05em;text-transform:uppercase;margin-bottom:2px}
.hmetric-value{font-size:18px;font-weight:800;color:#e6edf3;line-height:1}
.hmetric-sub{font-size:10px;color:#8b949e;margin-top:2px}
.hmetric.teal .hmetric-value{color:#7ecfe0}
.hmetric.green .hmetric-value{color:#3fb950}
.hmetric.purple .hmetric-value{color:#d2a8ff}
.hmetric.orange .hmetric-value{color:#f0a500}
.hmetric.lift .hmetric-value{color:#3fb950;font-size:22px}

/* VERSION */
#version-badge{position:fixed;bottom:10px;right:14px;font-size:14px;font-weight:700;color:#7ecfe0;background:#0d1117;border:1px solid #21262d;border-radius:10px;padding:4px 12px;z-index:100;pointer-events:none}

/* LAYOUT */
#main{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
#sidebar{width:200px;flex-shrink:0;background:#161b22;border-right:1px solid #21262d;overflow-y:auto;padding:6px 0}
.div-item{padding:8px 14px 8px 10px;cursor:pointer;border-left:3px solid transparent;transition:all .12s;font-size:12px;color:#8b949e;line-height:1.3}
.div-item:hover{background:#1c2128;color:#c9d1d9}
.div-item.active{background:#1c2128;border-left-color:#7ecfe0;color:#e6edf3;font-weight:600}
.div-item.cancelled{opacity:.5}
.div-date{font-size:10px;color:#484f58;margin-top:2px}
.div-itm-pill{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;margin-top:3px}
.pill-up{background:#0d2b0d;color:#3fb950;border:1px solid #1a4d1a}
.pill-flat{background:#21262d;color:#8b949e;border:1px solid #30363d}
.pill-none{background:#21262d;color:#484f58;border:1px solid #21262d}
.sidebar-section{padding:6px 14px 3px;font-size:10px;color:#484f58;letter-spacing:.06em;text-transform:uppercase;margin-top:4px}

/* CONTENT */
#content{flex:1;overflow-y:auto;padding:20px;background:#0d1117}

/* OVERVIEW */
.overview-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.chart-card{background:#161b22;border:1px solid #21262d;border-radius:10px;padding:16px}
.chart-card h3{font-size:13px;font-weight:700;color:#e6edf3;margin-bottom:12px;letter-spacing:.02em}
.chart-wrap{position:relative;height:260px}
.full-chart-card{background:#161b22;border:1px solid #21262d;border-radius:10px;padding:16px;margin-bottom:16px}
.full-chart-wrap{position:relative;height:300px}

.d-name{font-size:22px;font-weight:700;color:#e6edf3}
.d-meta{font-size:13px;color:#8b949e;margin-top:3px}
.d-badges{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}

.badge-cancelled{background:#2d0d0d;color:#f85149;border:1px solid #4d1a1a}

/* ── COMPUTED TOTALS ── */
function getTotals(){
  const active = VISITS.filter(v=>v.status!=='cancelled');
  const withITM = active.filter(v=>v.preITM!==null && v.postITM!==null);
  const totalReps = active.reduce((s,v)=>s+(v.reps||0),0);
  const totalCert = active.reduce((s,v)=>s+(v.certified||0),0);
  const totalAmb = active.reduce((s,v)=>s+v.ambassadors.filter(a=>a.name&&!a.name.startsWith('(')).length,0);
  const totalPreITM = withITM.reduce((s,v)=>s+v.preITM,0);
  const totalPostITM = withITM.reduce((s,v)=>s+v.postITM,0);
  const itmLift = totalPreITM>0 ? Math.round((totalPostITM-totalPreITM)/totalPreITM*100) : null;
  const excluded = ['n/a','virtual / n/a','virtual','(departed early — 3hr drive to baltimore)','(all models closed — team went to top golf)','(models closed — weather)'];
  const totalModelHomes = active.reduce((s,v)=>s+v.modelHomes.filter(m=>m&&!excluded.includes(m.toLowerCase())).length,0);
  return {divisions:active.length, reps:totalReps, certified:totalCert, ambassadors:totalAmb, preITM:totalPreITM, postITM:totalPostITM, itmLift, modelHomes:totalModelHomes};
}

  <div class="div-item${selectedIdx==='divisions'?' active':''}" onclick="showDivisions()" style="font-weight:700;color:#d2a8ff;border-left-color:${selectedIdx==='divisions'?'#d2a8ff':'transparent'}">📋 Training Summary</div>
  <a href="hst_analysis.html" target="_blank" class="div-item" style="font-weight:700;color:#8b949e;display:block;text-decoration:none;border-left-color:transparent">🔍 HST vs ITM Analysis</a>
  <div class="sidebar-section">Divisions</div>`;
  VISITS.forEach((v,i)=>{
    const lift = v.preITM!==null && v.postITM!==null ? v.postITM - v.preITM : null;
    let pillHtml='';
    if(v.status==='cancelled'){
      pillHtml='<div><span class="div-itm-pill pill-flat">CANCELLED</span></div>';
    } else if(lift===null){
      pillHtml='';
    } else if(lift>0){
      pillHtml=`<div><span class="div-itm-pill pill-up">ITM +${lift}</span></div>`;
    } else {
      pillHtml=`<div><span class="div-itm-pill pill-flat">ITM ±0</span></div>`;
    }
    const cls = ['div-item', v.status==='cancelled'?'cancelled':'', i===selectedIdx?'active':''].filter(Boolean).join(' ');
    sb.innerHTML+=`<div class="${cls}" onclick="selectVisit(${i})">
      ${v.division}, ${v.state}
      <div class="div-date">${v.date||'Date TBD'}</div>
      ${pillHtml}
    </div>`;
  });
}

/* ── SELECT VISIT ── */
function selectVisit(i){
  selectedIdx = i;
  renderSidebar();
  renderDetail(VISITS[i], i);
}

/* ── RENDER DETAIL ── */
function renderDetail(v, idx){
  const lift = v.preITM!==null && v.postITM!==null ? v.postITM - v.preITM : null;
  const liftPct = (lift!==null && v.preITM>0) ? Math.round(lift/v.preITM*100) : null;

  const statusBadge = v.status==='cancelled'
    ? '<span class="badge badge-cancelled">CANCELLED</span>'
    : '<span class="badge badge-completed">COMPLETED</span>';
  const typeBadge = v.type==='PDP'?'<span class="badge badge-pdp">PDP</span>':
    v.type==='Virtual'?'<span class="badge badge-virtual">VIRTUAL</span>':'';

  /* ITM block */
  let itmHtml='';
  if(v.preITM!==null && v.postITM!==null){
    const liftDisplay = lift>0 ? `+${lift} (${liftPct!==null?'+'+liftPct+'%':'N/A'})` : lift===0 ? '±0' : `${lift}`;
    const liftColor = lift>0?'#3fb950':lift<0?'#f85149':'#8b949e';
    itmHtml=`<div class="itm-card">
      <div class="itm-block"><div class="itm-num before">${v.preITM}</div><div class="itm-label">Pre-Visit ITM</div></div>
      <div class="itm-arrow">→</div>
      <div class="itm-block"><div class="itm-num after">${v.postITM}</div><div class="itm-label">Post-Visit ITM</div></div>
      <div style="flex:1"></div>
      <div class="itm-lift"><div class="itm-lift-val" style="color:${liftColor}">${liftDisplay}</div><div class="itm-lift-label">ITM Change</div></div>
    </div>`;
  }

  /* Ambassadors */
  let ambHtml='';
  const namedAmb = v.ambassadors.filter(a=>a.name&&!a.name.startsWith('('));
  if(namedAmb.length>0){
    ambHtml=`<div class="info-section">
      <h4>Ambassadors (${namedAmb.length})</h4>
      <div class="info-card purple">
        <table class="amb-table">
          <tr><th>Name</th><th>Email</th><th>Phone</th></tr>
          ${namedAmb.map(a=>`<tr><td>${a.name}</td><td>${a.email||'—'}</td><td>${a.phone||'—'}</td></tr>`).join('')}
        </table>
      </div>
    </div>`;
  }

  /* Model homes */
  const mhList = v.modelHomes.filter(m=>m&&m.toLowerCase()!=='n/a'&&m.toLowerCase()!=='virtual / n/a');
  const mhHtml = mhList.length>0 ? `<div class="info-section">
    <h4>Model Homes (${mhList.length})</h4>
    <div class="info-card teal">${mhList.map(m=>`<div>📍 ${m}</div>`).join('')}</div>
  </div>`:'';

  /* Scenes */
  const scenesHtml = v.scenes&&v.scenes!=='n/a'&&v.scenes!=='n' ? `<div class="info-section">
    <h4>Scenes / Setups Achieved</h4>
    <div class="info-card green">${v.scenes}</div>
  </div>`:'';

  /* Highlights */
  const hlHtml = v.highlights ? `<div class="info-section">
    <h4>Highlights</h4>
    <div class="info-card yellow">${v.highlights}</div>
  </div>`:'';

  /* Follow-up */
  const fuHtml = (v.followUp||v.followUpNotes) ? `<div class="info-section">
    <h4>Follow-Up</h4>
    <div class="info-card" style="border-left:3px solid #79c0ff">
      ${v.followUp?`<div><strong>${v.followUp}</strong></div>`:''}
      ${v.followUpNotes?`<div style="color:#8b949e;margin-top:4px;font-size:12px">${v.followUpNotes}</div>`:''}
    </div>
  </div>`:'';

  /* Issues */
  const issueHtml = v.issues ? `<div class="info-section">
    <h4>Issues</h4>
    <div class="info-card red">${v.issues}</div>
  </div>`:'';

  document.getElementById('content').innerHTML = `
    <div class="d-header">
      <div class="d-name">${v.division}, ${v.state}</div>
      <div class="d-meta">${v.date||'Date TBD'} · ${v.type}</div>
      <div class="d-badges">${statusBadge}${typeBadge}</div>
    </div>

    <div class="d-metrics">
      <div class="d-metric teal"><div class="d-metric-val">${v.reps||0}</div><div class="d-metric-label">Reps Reached</div></div>
      <div class="d-metric green"><div class="d-metric-val">${v.certified||0}</div><div class="d-metric-label">Certified</div></div>
      <div class="d-metric purple"><div class="d-metric-val">${namedAmb.length}</div><div class="d-metric-label">Ambassadors</div></div>
      <div class="d-metric"><div class="d-metric-val">${mhList.length||0}</div><div class="d-metric-label">Model Homes</div></div>
    </div>

    ${itmHtml}
    ${hlHtml}
    ${ambHtml}
    ${mhHtml}
    ${scenesHtml}
    ${fuHtml}
    ${issueHtml}
  `;
}

          <div class="rm-stat"><div class="rm-stat-val">${rc.allTime.totalPacks.toLocaleString()}</div><div class="rm-stat-label">Total Packs</div></div>
          <div class="rm-stat"><div class="rm-stat-val teal">${rc.allTime.itmPacks.toLocaleString()}</div><div class="rm-stat-label">ITM Packs</div></div>
          <div class="rm-stat"><div class="rm-stat-val" style="color:#3fb950">${fmtK(rc.allTime.revenue)}</div><div class="rm-stat-label">Deako Revenue</div></div>
          <div class="rm-stat"><div class="rm-stat-val orange">${fmtK(rc.allTime.profit)}</div><div class="rm-stat-label">Deako Profit</div></div>
          <div class="rm-stat"><div class="rm-stat-val" style="color:#d2a8ff">${rc.allTime.convRateAll}%</div><div class="rm-stat-label">ITM Conv. Rate %</div></div>

  const labels = itmVisits.map(v=>v.division);

  const post = itmVisits.map(v=>v.postITM);

    type:'bar',
    data:{

      datasets:[
        {
          label:'Revenue',
          data: ITM_MONTHLY.revenue,
          backgroundColor:'#1f6feb',
          borderRadius:2,
          stack:'money'
        },
        {
          label:'Profit',
          data: ITM_MONTHLY.profit,
          backgroundColor:'#f0a500',
          borderRadius:2,
          stack:'money'
        },
        {
          label:'ITM Conversion Rate',
          data: ITM_MONTHLY.convRate,
          type:'line',
          borderColor:'#f85149',
          backgroundColor:'transparent',
          borderWidth:2,
          pointRadius:0,
          pointStyle:'line',
          yAxisID:'y2',
          tension:0.3
        }
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{labels:{color:'#8b949e',font:{size:11},usePointStyle:true}},
        tooltip:{
          callbacks:{
            label(ctx){
              if(ctx.dataset.yAxisID==='y2') return ` ITM Conv: ${ctx.parsed.y.toFixed(1)}%`;
              return ` ${ctx.dataset.label}: $${ctx.parsed.y.toLocaleString()}`;
            }
          }
        }
      },
      scales:{
        x:{ticks:{color:'#8b949e',font:{size:10}},grid:{color:'#21262d'}},
        y:{
          ticks:{color:'#8b949e',font:{size:11},callback:v=>'$'+v.toLocaleString()},
          grid:{color:'#21262d'},

        y2:{

          ticks:{color:'#f85149',font:{size:11},callback:v=>v+'%'},
          grid:{display:false},
          beginAtZero:true
        }
      }
    }
  });

  /* DPUP packs by initiative chart */
  const segLabel = {
    anchor:'center', align:'center', color:'#fff', font:{size:8,weight:'700'},
    display: ctx => (ctx.dataset.data[ctx.dataIndex] || 0) >= 8,
    formatter: v => v
  };
  new Chart(document.getElementById('dpupChart'), {
    type:'bar',
    data:{
      labels: DPUP_MONTHLY.labels,
      datasets:[
        {label:'ITM',        data:DPUP_MONTHLY.ITM,       backgroundColor:'#1f6feb', stack:'packs', borderRadius:2, datalabels:segLabel},
        {label:'spec',       data:DPUP_MONTHLY.spec,      backgroundColor:'#f0a500', stack:'packs', borderRadius:2, datalabels:segLabel},
        {label:'incentive',  data:DPUP_MONTHLY.incentive, backgroundColor:'#3fb950', stack:'packs', borderRadius:2, datalabels:segLabel},
        {label:'model',      data:DPUP_MONTHLY.model,     backgroundColor:'#79c0ff', stack:'packs', borderRadius:2, datalabels:segLabel},
        {label:'HST Direct', data:DPUP_MONTHLY.hstDirect, backgroundColor:'#f778ba', stack:'packs', borderRadius:2,
         datalabels:[
           segLabel,
           { anchor:'end', align:'end', color:'#e6edf3', font:{size:9,weight:'700'},
             display: ctx => ctx.chart.data.datasets.reduce((s,ds)=>s+(ds.data[ctx.dataIndex]||0),0) > 0,
             formatter:(v,ctx) => ctx.chart.data.datasets.reduce((s,ds)=>s+(ds.data[ctx.dataIndex]||0),0) }
         ]}
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      layout:{padding:{top:18}},
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{labels:{color:'#8b949e',font:{size:11}}},
        tooltip:{
          callbacks:{
            label(ctx){
              const total = ctx.chart.data.datasets.reduce((s,ds)=>s+(ds.data[ctx.dataIndex]||0),0);
              const pct = total>0 ? (ctx.parsed.y/total*100).toFixed(1) : 0;
              return ` ${ctx.dataset.label}: ${ctx.parsed.y}  (${pct}%)`;
            },
            footer(items){ return `Total: ${items.reduce((s,i)=>s+i.parsed.y,0)}`; }
          }
        }
      },
      scales:{
        x:{ticks:{color:'#8b949e',font:{size:10}},grid:{color:'#21262d'},stacked:true},
        y:{ticks:{color:'#8b949e',font:{size:11}},grid:{color:'#21262d'},beginAtZero:true,stacked:true}
      }
    },
    plugins:[ChartDataLabels]
  });

  /* Before/After per-division chart */
  new Chart(document.getElementById('itmChart'), {
    type:'bar',
    data:{
      labels,
      datasets:[
        {label:'Pre-Training ITM Packs', data:pre, backgroundColor:'#30363d', borderRadius:4},
        {label:'Post-Training ITM Packs', data:post, backgroundColor:'#3fb950', borderRadius:4}
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{labels:{color:'#8b949e',font:{size:11}}},
        datalabels:{
          anchor:'end', align:'end',
          color:'#e6edf3',
          font:{size:10,weight:'bold'},
          formatter:v=>v
        }
      },
      scales:{

}

/* ── CONVERSION BY DIVISION ── */
function showConvRates(period, value){
  selectedIdx = 'conv';
  renderSidebar();
  renderConvRates(period, value);
}

function renderConvRates(period, value){
  // period = 'yearly'|'quarterly'|'monthly'   value = '2025'|'2025-Q1'|'2025-01' etc.
  const src = CONV_DATA[period === 'yearly' ? 'yearly' : period === 'quarterly' ? 'quarterly' : 'monthly'];
  const latestMonth = [...new Set(CONV_DATA.monthly.map(d=>d.p))].sort().pop();
  const _ce = document.getElementById('content');
  const _sv = _ce.scrollTop;

  // Period options
  const allPeriods = [...new Set(src.map(d=>d.p))].sort();

  // For monthly: show per-division trend for selected division
  // For yearly/quarterly: show all divisions for selected period

  const fmtDiv = d => d.replace(/_/g,' ').replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
  const fmtPeriod = p => {
    if(period==='yearly') return p.substring(0,4);
    if(period==='quarterly'){
      const d=new Date(p+'-15'); const q=Math.ceil((d.getMonth()+1)/3);
      return `Q${q} ${d.getFullYear()}`;
    }
    const d=new Date(p+'-15'); return d.toLocaleString('default',{month:'short',year:'numeric'});
  };

  // Build period selector buttons/dropdown
  const fmtMonthShort = p => { const d=new Date(p+'-15'); return d.toLocaleString('default',{month:'short'})+` '${d.getFullYear().toString().slice(2)}`; };
  const recentMonths = [...allPeriods].slice(-12);
  const latestP = allPeriods[allPeriods.length-1];
  const yoyP = latestP ? `${+latestP.slice(0,4)-1}-${latestP.slice(5,7)}` : null;
  const showYoy = yoyP && allPeriods.includes(yoyP) && !recentMonths.includes(yoyP);
  const displayMonths = showYoy ? [yoyP, ...recentMonths] : recentMonths;
  const periodTabs = (period==='monthly')
    ? `<select id="conv-period-sel" onchange="renderConvRates('monthly',this.value)" style="background:#161b22;border:1px solid #30363d;border-radius:6px;padding:5px 10px;color:#c9d1d9;font-size:12px;cursor:pointer">
        ${[...allPeriods].reverse().map(p=>`<option value="${p}"${p===value?' selected':''}>${fmtPeriod(p)}</option>`).join('')}
       </select>
       <span style="color:#484f58;font-size:12px;margin:0 2px">|</span>
       ${displayMonths.map((p,idx)=>{const isYoy=showYoy&&idx===0;const isActive=p===value;const sep=(showYoy&&idx===1)?'<span style="color:#30363d;margin:0 3px;font-size:11px">|</span>':'';return sep+`<button onmouseenter="renderConvRates('monthly','${p}')" onclick="renderConvRates('monthly','${p}')" style="background:${isActive?'#1f6feb':isYoy?'#161b22':'#21262d'};border:${isActive?'none':isYoy?'1px solid #e3b34188':'1px solid #30363d'};border-radius:6px;padding:4px 8px;color:${isActive?'#fff':isYoy?'#e3b341':'#8b949e'};font-size:10px;font-weight:600;cursor:pointer;white-space:nowrap">${fmtMonthShort(p)}${isYoy?' ↩':''}</button>`;}).join('')}`
    : allPeriods.map(p=>`<button onmouseenter="renderConvRates('${period}','${p}')" onclick="renderConvRates('${period}','${p}')" style="background:${p===value?'#1f6feb':'#21262d'};border:${p===value?'none':'1px solid #30363d'};border-radius:6px;padding:4px 10px;color:${p===value?'#fff':'#8b949e'};font-size:11px;font-weight:600;cursor:pointer">${fmtPeriod(p)}</button>`).join('');

  if(period === 'monthly' && value && !/^\d{4}-\d{2}$/.test(value)){
    // division picker + that division's trend chart
    const divs = [...new Set(src.map(d=>d.div))].sort();
    // value for monthly is "div|period" or just div initially
    let selDiv = value.includes('|') ? value.split('|')[0] : (value.length<=7 ? divs[0] : value);
    const divData = src.filter(d=>d.div===selDiv).sort((a,b)=>a.p.localeCompare(b.p));

    _ce.innerHTML = `
      <div style="margin-bottom:14px">
        <div style="font-size:22px;font-weight:700;color:#7ecfe0">📈 Conversion Rate by Division</div>
        <div style="font-size:13px;color:#8b949e;margin-top:3px">Eligible homes, packs sold, and ITM conversion rate</div>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center">
        <button style="background:#1f6feb;border:none;border-radius:6px;padding:5px 12px;color:#fff;font-size:11px;font-weight:600;cursor:pointer">Monthly</button>
        <button onclick="renderConvRates('quarterly','2026-01')" onmouseenter="renderConvRates('quarterly','2026-01')" style="background:#21262d;border:1px solid #30363d;border-radius:6px;padding:5px 12px;color:#8b949e;font-size:11px;font-weight:600;cursor:pointer">Quarterly</button>
        <button onclick="renderConvRates('yearly','2026')" onmouseenter="renderConvRates('yearly','2026')" style="background:#21262d;border:1px solid #30363d;border-radius:6px;padding:5px 12px;color:#8b949e;font-size:11px;font-weight:600;cursor:pointer">Yearly</button>
        <span style="color:#484f58;font-size:12px;margin:0 4px">|</span>
        <select id="conv-div-sel" onchange="renderConvRates('monthly',this.value)" style="background:#161b22;border:1px solid #30363d;border-radius:6px;padding:5px 10px;color:#c9d1d9;font-size:12px;cursor:pointer">
          ${divs.map(d=>`<option value="${d}"${d===selDiv?' selected':''}>${fmtDiv(d)}</option>`).join('')}
        </select>
      </div>
      <div class="full-chart-card">
        <h3>${fmtDiv(selDiv)} — Monthly Trend <span style="font-size:10px;font-weight:400;color:#484f58;margin-left:8px">Eligible Homes · Packs Sold · Conv. Rate %</span></h3>
        <div style="position:relative;height:320px"><canvas id="convMonthChart"></canvas></div>
      </div>
      <div class="full-chart-card">
        <h3 style="margin-bottom:10px">${fmtDiv(selDiv)} — Monthly Detail</h3>
        <table class="summary-table">
          <tr><th>Month</th><th>Eligible Homes</th><th>Packs Sold</th><th>Conv. Rate %</th><th>Home Closes</th></tr>
          ${(()=>{ const clm=(CLOSES_DATA||{}).monthly||[]; const clmo={}; clm.forEach(r=>{if(r.div===selDiv)clmo[r.p]=r.n;}); return divData.slice().reverse().map(d=>`<tr>
            <td>${fmtPeriod(d.p)}</td>
            <td style="color:#8b949e">${d.e.toLocaleString()}</td>
            <td style="color:#3fb950;font-weight:700">${d.pk}</td>
            <td style="color:${d.r>=5?'#3fb950':d.r>=2?'#f0a500':'#f85149'};font-weight:700">${d.r.toFixed(2)}%</td>
            <td style="color:#7ecfe0;font-weight:700">${clmo[d.p]!=null?clmo[d.p].toLocaleString():'—'}</td>
          </tr>`).join(''); })()}
        </table>
      </div>`;
    _ce.scrollTop = _sv;

    new Chart(document.getElementById('convMonthChart'),{
      type:'bar',
      data:{
        labels: divData.map(d=>fmtPeriod(d.p)),
        datasets:[
          {label:'Eligible Homes', data:divData.map(d=>d.e), backgroundColor:'#1f6feb', borderRadius:2, yAxisID:'y',
           datalabels:{anchor:'end',align:'end',color:'#8b949e',font:{size:8},formatter:v=>v>=1000?(v/1000).toFixed(1)+'k':v}},
          {label:'Packs Sold',     data:divData.map(d=>d.pk), backgroundColor:'#3fb950', borderRadius:2, yAxisID:'y',
           datalabels:{anchor:'end',align:'end',color:'#3fb950',font:{size:8}}},
          {label:'Conv. Rate %',   data:divData.map(d=>d.r), type:'line', borderColor:'#f85149', backgroundColor:'transparent', borderWidth:2, pointRadius:3, pointStyle:'line', yAxisID:'y2', tension:0.3,
           datalabels:{anchor:'center',align:'top',color:'#f85149',font:{size:8},formatter:v=>v==null?'':v.toFixed(1)+'%'}}
        ]
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        layout:{padding:{top:18}},
        interaction:{mode:'index',intersect:false},
        plugins:{
          legend:{labels:{color:'#8b949e',font:{size:11},usePointStyle:true}},
          tooltip:{callbacks:{label(ctx){ return ctx.dataset.yAxisID==='y2'?` Conv Rate: ${ctx.parsed.y.toFixed(2)}%`:` ${ctx.dataset.label}: ${ctx.parsed.y.toLocaleString()}`;}}}
        },
        scales:{
          x:{ticks:{color:'#8b949e',font:{size:9},maxRotation:45},grid:{color:'#21262d'}},
          y:{ticks:{color:'#8b949e',font:{size:11}},grid:{color:'#21262d'},beginAtZero:true,stacked:false},
          y2:{position:'right',ticks:{color:'#f85149',font:{size:11},callback:v=>v+'%'},grid:{display:false},beginAtZero:true}
        }
      },
      plugins:[ChartDataLabels]
    });
    return;
  }

  // Monthly (all-divs), Yearly, or Quarterly — all divisions for selected period
  if(period === 'monthly' && !value) value = latestMonth;

  // Build maps before sort so sort keys can reference them
  const closesSrc = (CLOSES_DATA||{})[period==='yearly'?'yearly':period==='quarterly'?'quarterly':'monthly'] || [];
  const closesMap = {};
  closesSrc.forEach(r=>{ closesMap[r.div+'|'+r.p] = r.n; });
  const getCloses = div => closesMap[div+'|'+value] || null;
  const ratifSrc = (RATIF_DATA||{})[period==='yearly'?'yearly':period==='quarterly'?'quarterly':'monthly'] || [];
  const ratifMap = {}; ratifSrc.forEach(r=>{ ratifMap[r.div+'|'+r.p]=r.n; });
  const getRatif = div => ratifMap[div+'|'+value] || null;

  const getDivSortVal = d => {
    if(divSortBy==='e')      return d.e;
    if(divSortBy==='r')      return d.r;
    if(divSortBy==='ratif')  return ratifMap[d.div+'|'+value]||0;
    if(divSortBy==='closes') return closesMap[d.div+'|'+value]||0;
    return d.pk; // 'pk' default
  };
  const rows = src.filter(d=>d.p===value).sort((a,b)=>getDivSortVal(b)-getDivSortVal(a));
  const totalE      = rows.reduce((s,d)=>s+d.e,0);
  const totalPk     = rows.reduce((s,d)=>s+d.pk,0);
  const avgRate     = totalE>0 ? (totalPk/totalE*100).toFixed(2) : 0;
  const totalRatif  = rows.reduce((s,d)=>s+(ratifMap[d.div+'|'+value]||0),0);
  const totalCloses = rows.reduce((s,d)=>s+(closesMap[d.div+'|'+value]||0),0);

  _ce.innerHTML = `
    <div style="margin-bottom:14px">
      <div style="font-size:22px;font-weight:700;color:#7ecfe0">📈 Conversion Rate by Division</div>
      <div style="font-size:13px;color:#8b949e;margin-top:3px">Eligible homes, packs sold, and ITM conversion rate · ${fmtPeriod(value)}</div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center">
      <button onclick="renderConvRates('monthly','${period==='monthly'?value:latestMonth}')" onmouseenter="renderConvRates('monthly','${period==='monthly'?value:latestMonth}')" style="background:${period==='monthly'?'#1f6feb':'#21262d'};border:${period==='monthly'?'none':'1px solid #30363d'};border-radius:6px;padding:5px 12px;color:${period==='monthly'?'#fff':'#8b949e'};font-size:11px;font-weight:600;cursor:pointer">Monthly</button>
      <button onclick="renderConvRates('quarterly','${period==='quarterly'?value:'2026-01'}')" onmouseenter="renderConvRates('quarterly','${period==='quarterly'?value:'2026-01'}')" style="background:${period==='quarterly'?'#1f6feb':'#21262d'};border:${period==='quarterly'?'none':'1px solid #30363d'};border-radius:6px;padding:5px 12px;color:${period==='quarterly'?'#fff':'#8b949e'};font-size:11px;font-weight:600;cursor:pointer">Quarterly</button>
      <button onclick="renderConvRates('yearly','${period==='yearly'?value:'2026'}')" onmouseenter="renderConvRates('yearly','${period==='yearly'?value:'2026'}')" style="background:${period==='yearly'?'#1f6feb':'#21262d'};border:${period==='yearly'?'none':'1px solid #30363d'};border-radius:6px;padding:5px 12px;color:${period==='yearly'?'#fff':'#8b949e'};font-size:11px;font-weight:600;cursor:pointer">Yearly</button>
      <span style="color:#484f58;font-size:12px;margin:0 4px">|</span>
      ${periodTabs}
    </div>
    <div class="rm-stats" style="margin-bottom:16px">
      <div class="rm-stat"><div class="rm-stat-val" style="color:#8b949e">${rows.length}</div><div class="rm-stat-label">Divisions</div></div>
      <div class="rm-stat" style="cursor:pointer;${divSortBy==='e'?'border-color:#7ecfe0;':''}" onclick="divSortBy='e';renderConvRates('${period}','${value}')" title="Sort by Eligible Homes"><div class="rm-stat-val teal">${totalE.toLocaleString()}</div><div class="rm-stat-label">Eligible Homes${divSortBy==='e'?' ↓':''}</div></div>
      <div class="rm-stat" style="cursor:pointer;${divSortBy==='pk'?'border-color:#1f6feb;':''}" onclick="divSortBy='pk';renderConvRates('${period}','${value}')" title="Sort by Packs Sold"><div class="rm-stat-val" style="color:#1f6feb">${totalPk.toLocaleString()}</div><div class="rm-stat-label">Packs Sold${divSortBy==='pk'?' ↓':''}</div></div>
      <div class="rm-stat" style="cursor:pointer;${divSortBy==='r'?'border-color:#3fb950;':''}" onclick="divSortBy='r';renderConvRates('${period}','${value}')" title="Sort by Conv. Rate"><div class="rm-stat-val" style="color:#3fb950">${avgRate}%</div><div class="rm-stat-label">Conv. Rate%${divSortBy==='r'?' ↓':''}</div></div>
      <div class="rm-stat" style="cursor:pointer;${divSortBy==='ratif'?'border-color:#7ecfe0;':''}" onclick="divSortBy='ratif';renderConvRates('${period}','${value}')" title="Sort by Ratifications"><div class="rm-stat-val" style="color:#7ecfe0">${totalRatif.toLocaleString()}</div><div class="rm-stat-label">Ratifications${divSortBy==='ratif'?' ↓':''}</div></div>
      <div class="rm-stat" style="cursor:pointer;${divSortBy==='closes'?'border-color:#d2a8ff;':''}" onclick="divSortBy='closes';renderConvRates('${period}','${value}')" title="Sort by Closes"><div class="rm-stat-val" style="color:#d2a8ff">${totalCloses.toLocaleString()}</div><div class="rm-stat-label">Closes${divSortBy==='closes'?' ↓':''}</div></div>
    </div>
    <div class="full-chart-card">
      <h3>${fmtPeriod(value)} — All Divisions <span style="font-size:10px;font-weight:400;color:#484f58;margin-left:8px">sorted by ${divSortBy==='e'?'eligible homes':divSortBy==='r'?'conv. rate':divSortBy==='ratif'?'ratifications':divSortBy==='closes'?'closes':'packs sold'} · click a bar to see monthly detail</span></h3>
      <div style="position:relative;height:320px"><canvas id="convDivChart"></canvas></div>
    </div>
    <div class="full-chart-card">
      <h3>Division Pipeline — ${fmtPeriod(value)} <span style="font-size:10px;font-weight:400;color:#484f58;margin-left:8px">Eligible pool · Ratifications · Closes · Packs Sold — sorted by ${divSortBy==='e'?'eligible homes':divSortBy==='r'?'conv. rate':divSortBy==='ratif'?'ratifications':divSortBy==='closes'?'closes':'packs sold'}</span></h3>
      <div style="position:relative;height:580px"><canvas id="pipelineChart"></canvas></div>
    </div>
    <div class="full-chart-card">
      <h3 style="margin-bottom:12px">Division Breakdown — ${fmtPeriod(value)}</h3>
      <table class="summary-table">
        <tr><th>#</th><th>Division</th><th style="cursor:pointer" onclick="divSortBy='e';renderConvRates('${period}','${value}')">${divSortBy==='e'?'↓ ':''}<span style="color:${divSortBy==='e'?'#7ecfe0':'inherit'}">Eligible Homes</span></th><th style="cursor:pointer" onclick="divSortBy='pk';renderConvRates('${period}','${value}')">${divSortBy==='pk'?'↓ ':''}<span style="color:${divSortBy==='pk'?'#1f6feb':'inherit'}">Packs Sold</span></th><th style="cursor:pointer" onclick="divSortBy='r';renderConvRates('${period}','${value}')">${divSortBy==='r'?'↓ ':''}<span style="color:${divSortBy==='r'?'#3fb950':'inherit'}">Conv. Rate %</span></th><th style="cursor:pointer" onclick="divSortBy='ratif';renderConvRates('${period}','${value}')">${divSortBy==='ratif'?'↓ ':''}<span style="color:${divSortBy==='ratif'?'#7ecfe0':'inherit'}">Ratifications</span></th><th style="cursor:pointer" onclick="divSortBy='closes';renderConvRates('${period}','${value}')">${divSortBy==='closes'?'↓ ':''}<span style="color:${divSortBy==='closes'?'#d2a8ff':'inherit'}">Home Closes</span></th></tr>
        ${rows.map((d,i)=>{ const cl=getCloses(d.div); const rf=getRatif(d.div); return `<tr style="cursor:pointer" onclick="renderConvRates('monthly','${d.div}')">
          <td style="color:#484f58;font-weight:700">#${i+1}</td>
          <td><strong>${fmtDiv(d.div)}</strong></td>
          <td style="color:#8b949e">${d.e.toLocaleString()}</td>
          <td style="color:#1f6feb;font-weight:700">${d.pk}</td>
          <td style="color:${d.r>=5?'#3fb950':d.r>=2?'#f0a500':'#f85149'};font-weight:700">${d.r.toFixed(2)}%</td>
          <td style="color:#7ecfe0">${rf!=null?rf.toLocaleString():'—'}</td>
          <td style="color:#7ecfe0;font-weight:700">${cl!=null?cl.toLocaleString():'—'}</td>
        </tr>`;}).join('')}
      </table>
    </div>`;
  _ce.scrollTop = _sv;

  new Chart(document.getElementById('convDivChart'),{
    type:'bar',
    data:{
      labels: rows.map(d=>fmtDiv(d.div)),
      datasets:[
        {label:'Eligible Homes', data:rows.map(d=>d.e), backgroundColor:'#1f6feb', borderRadius:3, yAxisID:'y', hidden:convDivHidden.has('Eligible Homes'),
         datalabels:{anchor:'end',align:'end',color:'#8b949e',font:{size:8},clamp:true,formatter:v=>v>=1000?(v/1000).toFixed(1)+'k':v}},
        {label:'Packs Sold',     data:rows.map(d=>d.pk), backgroundColor:'#3fb950', borderRadius:3, yAxisID:'y', hidden:convDivHidden.has('Packs Sold'),
         datalabels:{anchor:'end',align:'end',color:'#3fb950',font:{size:8},clamp:true}},
        {label:'Conv. Rate %',   data:rows.map(d=>d.r), type:'line', borderColor:'#f85149', backgroundColor:'transparent', borderWidth:2, pointRadius:4, pointBackgroundColor:'#f85149', pointStyle:'line', yAxisID:'y2', tension:0.2, hidden:convDivHidden.has('Conv. Rate %'),
         datalabels:{anchor:'center',align:'top',color:'#f85149',font:{size:8},clamp:true,formatter:v=>v==null?'':v.toFixed(1)+'%'}}
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      layout:{padding:{top:18}},
      onClick(e,els){ if(els.length){ const d=rows[els[0].index]; renderConvRates('monthly',d.div); } },
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{
          onClick(e, item, legend){
            const lbl = item.text;
            convDivHidden.has(lbl) ? convDivHidden.delete(lbl) : convDivHidden.add(lbl);
            Chart.defaults.plugins.legend.onClick.call(this, e, item, legend);
          },
          labels:{color:'#8b949e',font:{size:11},usePointStyle:true}
        },
        tooltip:{callbacks:{label(ctx){ return ctx.dataset.yAxisID==='y2'?` Conv Rate: ${ctx.parsed.y.toFixed(2)}%`:` ${ctx.dataset.label}: ${ctx.parsed.y.toLocaleString()}`;}}}
      },
      scales:{
        x:{ticks:{color:'#8b949e',font:{size:10},maxRotation:35},grid:{color:'#21262d'}},
        y:{ticks:{color:'#8b949e',font:{size:11}},grid:{color:'#21262d'},beginAtZero:true},
        y2:{position:'right',ticks:{color:'#f85149',font:{size:11},callback:v=>v+'%'},grid:{display:false},beginAtZero:true}
      }
    },
    plugins:[ChartDataLabels]
  });

  // ratifMap + closesMap already built above for the table

  // Pipeline rows: same order as conv rows (sorted by eligible homes desc)
  const pipLabels = rows.map(d=>fmtDiv(d.div));
  const pipE  = rows.map(d=>d.e);
  const pipR  = rows.map(d=>ratifMap[d.div+'|'+value]||0);
  const pipCl = rows.map(d=>closesMap[d.div+'|'+value]||0);
  const pipPk = rows.map(d=>d.pk);

  new Chart(document.getElementById('pipelineChart'),{
    type:'bar',
    data:{
      labels: pipLabels,
      datasets:[
        {label:'Eligible Homes', data:pipE,  backgroundColor:'#1f6feb', borderWidth:0, barPercentage:0.75, categoryPercentage:0.85, hidden:pipelineHidden.has('Eligible Homes')},
        {label:'Ratifications',  data:pipR,  backgroundColor:'#7ecfe0', borderWidth:0, barPercentage:0.75, categoryPercentage:0.85, hidden:pipelineHidden.has('Ratifications')},
        {label:'Closes',         data:pipCl, backgroundColor:'#d2a8ff', borderWidth:0, barPercentage:0.75, categoryPercentage:0.85, hidden:pipelineHidden.has('Closes')},
        {label:'Packs Sold',     data:pipPk, backgroundColor:'#3fb950', borderWidth:0, barPercentage:0.75, categoryPercentage:0.85, hidden:pipelineHidden.has('Packs Sold')}
      ]
    },
    options:{
      indexAxis:'y',
      responsive:true, maintainAspectRatio:false,
      onClick(e,els){ if(els.length){ renderConvRates('monthly', rows[els[0].index].div); } },
      interaction:{mode:'index',intersect:false,axis:'y'},
      plugins:{
        legend:{
          onClick(e, item, legend){
            const lbl = item.text;
            pipelineHidden.has(lbl) ? pipelineHidden.delete(lbl) : pipelineHidden.add(lbl);
            Chart.defaults.plugins.legend.onClick.call(this, e, item, legend);
          },
          labels:{color:'#8b949e',font:{size:11},usePointStyle:true,boxWidth:12}
        },
        tooltip:{
          callbacks:{
            title(items){ return items[0]?.label || ''; },
            label(ctx){ return ` ${ctx.dataset.label}: ${ctx.parsed.x.toLocaleString()}`; },
            afterBody(items){
              const i = items[0]?.dataIndex;
              if(i==null) return [];
              const rat = pipR[i], cl = pipCl[i], pk = pipPk[i], el = pipE[i];
              return ['',
                `  Packs/Eligible: ${el>0?(pk/el*100).toFixed(1)+'%':'—'}`,
                `  Packs/Ratified: ${rat>0?(pk/rat*100).toFixed(1)+'%':'—'}`,
                `  Packs/Closes:   ${cl>0?(pk/cl*100).toFixed(1)+'%':'—'}`
              ];
            }
          }
        }
      },
      scales:{
        x:{ticks:{color:'#8b949e',font:{size:10}},grid:{color:'#21262d'},beginAtZero:true},
        y:{ticks:{color:'#c9d1d9',font:{size:10}},grid:{color:'#21262d'}}
      }
    }
  });
}

function showRainmakers(){
  selectedIdx = 'rainmakers';
  renderSidebar();
  renderRainmakers('','');
}

function renderRainmakers(filter, divFilter, sortBy='t'){
  const divs = [...new Set(RAINMAKERS.map(r=>r.d))].sort();
  const getSV = (r,k) => k==='rev' ? r.p25*2700+r.p10*1125+r.p8*399 : (r[k]||0);
  const filtered = RAINMAKERS.filter(r=>{
    const nameMatch = !filter || r.n.toLowerCase().includes(filter.toLowerCase());
    const divMatch  = !divFilter || r.d === divFilter;
    return nameMatch && divMatch;
  }).slice().sort((a,b)=> getSV(b,sortBy) - getSV(a,sortBy));
  const totalPacks = filtered.reduce((s,r)=>s+r.t,0);
  const total25    = filtered.reduce((s,r)=>s+r.p25,0);
  const total10    = filtered.reduce((s,r)=>s+r.p10,0);
  const total8     = filtered.reduce((s,r)=>s+r.p8,0);
  const totalRev   = filtered.reduce((s,r)=>s+(r.p25*2700+r.p10*1125+r.p8*399),0);
  const totalL3    = filtered.reduce((s,r)=>s+(r.l3||0),0);
  const totalH3    = filtered.reduce((s,r)=>s+(r.h3||0),0);
  const maxVal     = filtered.length ? getSV(filtered[0], sortBy) : 1;

  document.getElementById('content').innerHTML = `
    <div style="margin-bottom:14px">
      <div style="font-size:22px;font-weight:700;color:#f0a500">🏆 Rainmakers</div>
      <div style="font-size:13px;color:#8b949e;margin-top:3px">Sorted by: <strong style="color:#e6edf3">${sortBy==='p25'?'25-Pack':sortBy==='p10'?'10-Pack':sortBy==='p8'?'8-Pack':sortBy==='l3'?'Packs Sold (3 Mo.)':sortBy==='h3'?'Homes Sold':sortBy==='rev'?'Deako Revenue':'Total Packs'}</strong> · ${filtered.length.toLocaleString()} agents · click stat boxes to re-sort</div>
    </div>
    <div class="rm-stats">
      <div class="rm-stat"><div class="rm-stat-val teal">${filtered.length.toLocaleString()}</div><div class="rm-stat-label">Agents</div></div>
      <div class="rm-stat"><div class="rm-stat-val" style="color:#8b949e">${[...new Set(filtered.map(r=>r.d))].length}</div><div class="rm-stat-label">Divisions</div></div>
      <div class="rm-stat" style="cursor:pointer;${sortBy==='t'?'border-color:#f0a500;':''}" onclick="renderRainmakers('${filter}','${divFilter}','t')" title="Sort by Total Packs"><div class="rm-stat-val">${totalPacks.toLocaleString()}</div><div class="rm-stat-label">Total Packs${sortBy==='t'?' ↓':''}</div></div>
      <div class="rm-stat" style="cursor:pointer;${sortBy==='l3'?'border-color:#d2a8ff;':''}" onclick="renderRainmakers('${filter}','${divFilter}','l3')" title="Sort by Packs Sold (3 Mo.)"><div class="rm-stat-val" style="color:#d2a8ff">${totalL3.toLocaleString()}</div><div class="rm-stat-label">Packs Sold (3 Mo.)${sortBy==='l3'?' ↓':''}</div></div>
      <div class="rm-stat" style="cursor:pointer;${sortBy==='h3'?'border-color:#7ecfe0;':''}" onclick="renderRainmakers('${filter}','${divFilter}','h3')" title="Sort by Homes Sold"><div class="rm-stat-val" style="color:#7ecfe0">${totalH3.toLocaleString()}</div><div class="rm-stat-label">Homes Sold (3 Mo.)${sortBy==='h3'?' ↓':''}</div></div>
      <div class="rm-stat" style="cursor:pointer;${sortBy==='p25'?'border-color:#3fb950;':''}" onclick="renderRainmakers('${filter}','${divFilter}','p25')" title="Sort by 25-Pack"><div class="rm-stat-val" style="color:#3fb950">${total25.toLocaleString()}</div><div class="rm-stat-label">25-Pack${sortBy==='p25'?' ↓':''}</div></div>
      <div class="rm-stat" style="cursor:pointer;${sortBy==='p10'?'border-color:#79c0ff;':''}" onclick="renderRainmakers('${filter}','${divFilter}','p10')" title="Sort by 10-Pack"><div class="rm-stat-val" style="color:#79c0ff">${total10.toLocaleString()}</div><div class="rm-stat-label">10-Pack${sortBy==='p10'?' ↓':''}</div></div>
      <div class="rm-stat" style="cursor:pointer;${sortBy==='p8'?'border-color:#f0a500;':''}" onclick="renderRainmakers('${filter}','${divFilter}','p8')" title="Sort by 8-Pack"><div class="rm-stat-val orange">${total8.toLocaleString()}</div><div class="rm-stat-label">8-Pack${sortBy==='p8'?' ↓':''}</div></div>
      <div class="rm-stat" style="cursor:pointer;${sortBy==='rev'?'border-color:#3fb950;':''}" onclick="renderRainmakers('${filter}','${divFilter}','rev')" title="Sort by Deako Revenue"><div class="rm-stat-val" style="color:#3fb950">$${totalRev.toLocaleString()}</div><div class="rm-stat-label">Deako Revenue${sortBy==='rev'?' ↓':''}</div></div>
    </div>
    <div class="rm-controls">
      <input type="text" id="rm-search" placeholder="Search agent name..." value="${filter}" oninput="renderRainmakers(this.value, document.getElementById('rm-div').value, '${sortBy}')">
      <select id="rm-div" onchange="renderRainmakers(document.getElementById('rm-search').value, this.value, '${sortBy}')">
        <option value="">All Divisions</option>
        ${divs.map(d=>`<option value="${d}"${d===divFilter?' selected':''}>${d}</option>`).join('')}
      </select>
    </div>
    <div style="background:#161b22;border:1px solid #21262d;border-radius:10px;overflow:hidden">
      <table class="rm-table">
        <tr><th>#</th><th>Agent</th><th style="${divFilter?'cursor:pointer;color:#f0a500':''}" title="${divFilter?'Click to clear division filter':''}" onclick="${divFilter?`renderRainmakers('${filter.replace(/'/g,"\\'")}','','${sortBy}')`:''}">Division${divFilter?` → ALL`:''}</th><th>Community</th><th>Homes Sold</th><th>Packs Sold (3 Mo.)</th><th>Total Packs</th><th>Deako Revenue</th><th>Pack Mix</th><th>Contact</th></tr>
        ${filtered.slice(0,200).map((r,i)=>{
          const pct = Math.round(getSV(r,sortBy)/maxVal*100);
          const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
          const rev = r.p25*2700 + r.p10*1125 + r.p8*399;
          const hasBoth = r.em && r.ph;
          const contactHtml = hasBoth
            ? `<div class="contact-wrap">📇<div class="contact-tip"><div class="contact-tip-row">📧 <a href="mailto:${r.em}">${r.em}</a></div><div class="contact-tip-row">📞 <a href="tel:${r.ph}">${r.ph}</a></div></div></div>`
            : r.em ? `<a href="mailto:${r.em}" title="${r.em}" style="color:#7ecfe0;text-decoration:none">📧</a>`
            : r.ph ? `<a href="tel:${r.ph}" title="${r.ph}" style="color:#3fb950;text-decoration:none">📞</a>`
            : '';
          return `<tr>
            <td class="rm-rank${i<3?' top3':''}">${medal||('#'+(i+1))}</td>
            <td><strong>${r.n}</strong></td>
            <td style="color:#79c0ff;cursor:pointer;text-decoration:underline dotted" title="Filter by ${r.d}" onclick="renderRainmakers('','${r.d.replace(/'/g,String.fromCharCode(39))}','${sortBy}')">${r.d}</td>
            <td style="color:#8b949e;font-size:11px">${r.cm||'—'}</td>
            <td style="color:#7ecfe0;font-weight:700">${r.h3||0}</td>
            <td style="color:#d2a8ff;font-weight:700">${r.l3||0}</td>
            <td><strong>${r.t}</strong><span class="rm-bar-wrap"><span class="rm-bar-fill" style="width:${pct}%"></span></span></td>
            <td style="color:#3fb950;font-weight:700">$${rev.toLocaleString()}</td>
            <td>
              ${r.p25>0?`<span class="rm-pack-badge rm-p25">25×${r.p25}</span>`:''}
              ${r.p10>0?`<span class="rm-pack-badge rm-p10">10×${r.p10}</span>`:''}
              ${r.p8>0?`<span class="rm-pack-badge rm-p8">8×${r.p8}</span>`:''}
            </td>
            <td style="text-align:center">${contactHtml}</td>
          </tr>`;
        }).join('')}
        ${filtered.length>200?`<tr><td colspan="10" style="text-align:center;color:#484f58;padding:10px">Showing top 200 of ${filtered.length} — refine search to see more</td></tr>`:''}
      </table>
    </div>
  `;
}

/* ── DIV TAB SWITCH ── */
function switchDivTab(tab){
  document.getElementById('div-table-body').innerHTML = renderDivTable(tab);
  ['last3','y2025','allTime'].forEach(t=>{
    const btn = document.getElementById('tab-'+t);
    if(btn) btn.style.cssText = t===tab
      ? 'background:#1f6feb;border:none;border-radius:6px;padding:5px 12px;color:#fff;font-size:11px;font-weight:600;cursor:pointer'
      : 'background:#21262d;border:1px solid #30363d;border-radius:6px;padding:5px 12px;color:#8b949e;font-size:11px;font-weight:600;cursor:pointer';
  });
}

/* ── INIT ── */
renderMetrics();
renderSidebar();
renderOverview();
document.getElementById('sidebar').addEventListener('click', function(e){
  if(!e.target.closest('.div-item')) return;
});
</script>
